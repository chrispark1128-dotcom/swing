<script>
"use strict";

/* ══════════════════════════════════════════════════════════════════════
   ⚙️ CONFIG — 튜닝 손잡이. 정확도 개선은 여기 "숫자만" 바꾸면 됩니다.
   ──────────────────────────────────────────────────────────────────────
   ★ 규칙(배점/기준)을 바꿀 때는 반드시 version을 올리세요 (예 "v7.0"→"v7.1").
     그래야 자기검증 성과표가 "새 규칙 기준"으로만 다시 집계됩니다.
   ★ 개선 순서: ①매일 돌려 데이터 쌓기 → ②성과표·팩터진단 읽기
     → ③수익 잘 가르는 요소 배점↑/못 가르는 요소↓ → version 올리고 ①로.
   ══════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  // ▼ 업비트 요청이 "Failed to fetch"로 막히면(한국 IP rate limit) 아래를 본인 Cloudflare Worker 주소로 교체.
  //   예: "https://swing-proxy.chrispark1128.workers.dev/v1"  (끝에 /v1 반드시 포함)
  apiBase: "https://swing-proxy.chrispark1128.workers.dev/v1",
  version: "v10.0",      // ← 규칙 바꿀 때마다 올리기 (v10.0: 제외 종목 추적 + copytext 성과통계)
  evalWindow: 21,        // 예측 유효기간(일). 이 안에 목표/손절 안 닿으면 만료 처리

  ind: {                 // 지표 기간
    emaFast:20, emaSlow:50, smaLong:200, rsi:14,
    macdFast:12, macdSlow:26, macdSig:9, atr:14,
    resWin:30, res90Win:90, volAvgWin:20,
  },
  trend: {               // 추세 배점
    aboveEmaFast:10,       // 현재가 > 20일선
    emaFastOverSlow:10,    // 20일선 > 50일선
    aboveSma:10,           // 현재가 > 200일선
    aboveEmaSlowIfNoSma:5, // 200일선 데이터 없으면 대체(현재가>50일선)
  },
  momentum: {            // 모멘텀 배점
    rsiSweetLo:45, rsiSweetHi:65, rsiSweetPts:12,  // RSI 45~65 = 이상적
    rsiOkLo:40, rsiOkHi:70, rsiOkPts:7,            // 40~45 또는 65~70 = 무난
    rsiHotTh:78, rsiHotPts:-5,                     // 78 초과 = 과열 감점
    macdUpPts:8,                                   // MACD 골든
  },
  volume: {              // 거래량 배점(20일 평균 대비 배수)
    strongTh:1.2, strongPts:10,
    okTh:0.9, okPts:5,
  },
  setup: {               // 자리(셋업) 배점
    posLowTh:0.35, posLowPts:8,   // 지지~저항 사이 위치가 낮을수록 좋음
    posMidTh:0.6,  posMidPts:4,
    hrFarTh:15, hrFarPts:7,       // 위 저항까지 여유(%)
    hrMidTh:10, hrMidPts:4,
    hrNearTh:6, hrNearPts:-3,     // 저항 코앞이면 감점
  },
  relStr: {              // 상대강도(BTC 7일 대비)
    beatPts:6, bigGapTh:5, bigGapPts:10,
  },
  penalty: {             // 감점 규칙(값은 음수)
    pumpHardTh:25, pumpHardPts:-12,   // 이미 급등
    pumpSoftTh:15, pumpSoftPts:-6,
    pumpNoVolTh:10, pumpNoVolRatio:0.9, pumpNoVolPts:-8,  // 올랐는데 거래량 없음
    rsiOverboughtTh:75, rsiOverboughtPts:-6,
    resTooCloseTh:6, resTooClosePts:-6,  // 저항까지 6%뿐
    belowWeeklyPts:-6,                   // 주봉 아래(역추세)
    noisyStopAtr:1.2, noisyStopFrac:0.05, noisyStopPts:-5,  // 스탑 노이즈 위험
  },
  regime: {              // 국면(regime) 감점 — 전 후보에 공통 적용 (v8.0 신규)
    btcBelowMa:-5,          // ① BTC < 50일선 (기존값 유지)
    volContract:-3,         // ② 거래량 위축 (업비트 자금 유입 둔화)
    volContractRatio:0.8,   //    BTC 일봉 거래대금(오늘·페이스보정) < 7일평균 × 이 값 → 위축
    btcDominance:-2,        // ③ BTC 주도장 (btc7 > 후보 c7 중앙값 → 알트 소외)
  },
  warning: {             // 업비트 마켓 이벤트 감점 (v9.0 신규) — 전 후보 개별 적용
    warnPts:-25,            // 투자유의(market_event.warning) — 상폐 위험, 사실상 제외권으로
    cautionPts:-15,         // 주의환기(caution: 거래량급증·가격급등락 등) — 업비트 "위험" 표기, 급등 회피 강화
  },
  plan: {                // 진입/손절/목표
    t1:1.10, t2:1.20,        // 목표가 배수(+10%·+20%)
    atrEntryLow:1.0,         // 진입존 하단 = max(지지, 현재가 - N×ATR)
    supBuffer:0.5, atrStop:1.8,  // 원손절 후보 = min(지지-0.5×ATR, 현재가-1.8×ATR)
  },
  select: {              // 후보 선정
    minTradeValue24h:5e8,   // 최소 24h 거래대금(원)
    minAbsChange:0.3,       // |24h 등락|이 이 미만이면 제외
    quietMaxChange:3.0,     // |등락|이 이 이하면 '조용한' 후보로도 편입
    momentumWeight:0.6,     // 모멘텀 정렬 = 0.6×등락 + 유동성
    momShareNum:3, momShareDen:5,  // 후보의 3/5는 모멘텀, 나머지는 조용한 종목
  },
  tier: { t1Th:1e11, t2Th:2e10 },  // 유동성 등급 경계(거래대금)
};
const UP=CONFIG.apiBase;

const $=(s)=>document.querySelector(s);
const out=$("#out"), statusEl=$("#status"), pbar=$("#pbar"), runBtn=$("#run");
$("#vtag").textContent=CONFIG.version+" · web·r8";
function setStatus(t){statusEl.textContent=t}
function setProg(f){pbar.style.width=Math.max(0,Math.min(1,f))*100+"%"}
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

/* ---------- throttled fetch (429 대비) ---------- */
let _last=0;
async function gj(url,retries=6,gap=200){
  let err=null;
  for(let i=0;i<retries;i++){
    const wait=gap-(Date.now()-_last);
    if(wait>0) await sleep(wait);
    _last=Date.now();
    try{
      const r=await fetch(url,{headers:{Accept:"application/json"},cache:"no-store"});
      if(r.status===429){ err=new Error("HTTP 429(요청 제한)"); await sleep(800*(i+1)); continue; }
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){ err=e; await sleep(500*(i+1)); }
  }
  throw new Error("GET fail "+url.slice(0,80)+"… — "+(err&&err.message||err));
}

/* ---------- 지표 ---------- */
function ema(v,p){ if(v.length<p) return v.map(()=>null);
  const o=v.map(()=>null); const k=2/(p+1); let s=0;
  for(let i=0;i<p;i++) s+=v[i]; s/=p; o[p-1]=s; let pr=s;
  for(let i=p;i<v.length;i++){ pr=v[i]*k+pr*(1-k); o[i]=pr; } return o; }
function sma(v,p){ const o=v.map(()=>null); let r=0;
  for(let i=0;i<v.length;i++){ r+=v[i]; if(i>=p) r-=v[i-p]; if(i>=p-1) o[i]=r/p; } return o; }
function rsi(v,p=14){ const o=v.map(()=>null); if(v.length<=p) return o;
  let g=0,l=0; for(let i=1;i<=p;i++){ const d=v[i]-v[i-1]; g+=Math.max(d,0); l+=Math.max(-d,0); }
  let ag=g/p, al=l/p; o[p]= al? 100-100/(1+ag/al):100;
  for(let i=p+1;i<v.length;i++){ const d=v[i]-v[i-1];
    ag=(ag*(p-1)+Math.max(d,0))/p; al=(al*(p-1)+Math.max(-d,0))/p;
    o[i]= al? 100-100/(1+ag/al):100; } return o; }
function macd(v,f=12,s=26,sig=9){ const ef=ema(v,f), es=ema(v,s); const m=v.map(()=>null);
  for(let i=0;i<v.length;i++) if(ef[i]!=null&&es[i]!=null) m[i]=ef[i]-es[i];
  const val=[]; m.forEach((x,i)=>{ if(x!=null) val.push([i,x]); }); const sg=v.map(()=>null);
  if(val.length>=sig){ const seq=val.map(x=>x[1]); const e=ema(seq,sig);
    val.forEach((pair,idx)=>{ sg[pair[0]]=e[idx]; }); } return [m,sg]; }
function atr(h,l,c,p=14){ const n=c.length; const tr=new Array(n).fill(0);
  for(let i=0;i<n;i++) tr[i]= i===0? h[i]-l[i]: Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1]));
  if(n<=p) return null; let a=0; for(let i=1;i<=p;i++) a+=tr[i]; a/=p;
  for(let i=p+1;i<n;i++) a=(a*(p-1)+tr[i])/p; return a; }
function last(x){ for(let i=x.length-1;i>=0;i--) if(x[i]!=null) return x[i]; return null; }
const mx=(a)=>Math.max.apply(null,a), mn=(a)=>Math.min.apply(null,a);

/* ---------- 업비트 데이터 ---------- */
const CAUTION_LABELS={PRICE_FLUCTUATIONS:"가격급등락",TRADING_VOLUME_SOARING:"거래량급증",DEPOSIT_AMOUNT_SOARING:"입금량급증",GLOBAL_PRICE_DIFFERENCES:"가격괴리",CONCENTRATION_OF_SMALL_ACCOUNTS:"소액집중"};
async function universe(){ const d=await gj(`${UP}/market/all?isDetails=true`); const o=[];
  for(const m of d){ const mk=m.market||"";
    if(mk.startsWith("KRW-")){ const ev=m.market_event||{}; const cev=(ev&&ev.caution)||{};
      const cReasons=Object.keys(cev).filter(k=>cev[k]).map(k=>CAUTION_LABELS[k]||k);
      o.push({market:mk,symbol:mk.slice(4),name:m.korean_name,warn:!!(ev&&ev.warning),
        caution:cReasons.length>0,cautionReasons:cReasons}); } } return o; }
async function tickers(mks){ const o={};
  for(let i=0;i<mks.length;i+=30){ const q=encodeURIComponent(mks.slice(i,i+30).join(","));
    for(const t of await gj(`${UP}/ticker?markets=${q}`))
      o[t.market]={price:t.trade_price,ch24:(t.signed_change_rate||0)*100,tv:t.acc_trade_price_24h||0}; }
  return o; }
async function daily(mk,cnt=200){ const d=(await gj(`${UP}/candles/days?market=${mk}&count=${Math.min(cnt,200)}`)).reverse();
  return [d.map(c=>c.high_price),d.map(c=>c.low_price),d.map(c=>c.trade_price),d.map(c=>c.candle_acc_trade_volume),d.map(c=>c.candle_acc_trade_price)]; }

/* 자기검증용: 날짜 포함 캔들 (캐시) */
const _candCache={};
async function candDates(mk){ if(!_candCache[mk]){ const d=(await gj(`${UP}/candles/days?market=${mk}&count=200`)).reverse();
  _candCache[mk]=[d.map(c=>c.candle_date_time_utc.slice(0,10)),d.map(c=>c.high_price),d.map(c=>c.low_price),d.map(c=>c.trade_price)]; }
  return _candCache[mk]; }

/* ---------- 리스크 티어 ---------- */
function tier(tv,warn){ if(warn) return["🔴 T3","⚠️유의종목"];
  if(tv>=CONFIG.tier.t1Th) return["🟢 T1","고유동성"];
  if(tv>=CONFIG.tier.t2Th) return["🟡 T2","중유동성"]; return["🔴 T3","저유동성"]; }

/* ---------- 분석 ---------- */
function analyze(h,l,c,vol,elapsed=1.0){
  const I=CONFIG.ind;
  if(c.length<62) return null;
  const hc=h.slice(0,-1),lc=l.slice(0,-1),cc=c.slice(0,-1),vc=vol.slice(0,-1);
  const price=c[c.length-1];
  const e20=last(ema(cc,I.emaFast)),e50=last(ema(cc,I.emaSlow));
  const s200= cc.length>=I.smaLong? last(sma(cc,I.smaLong)):null;
  const r=last(rsi(cc,I.rsi)); const [m,sg]=macd(cc,I.macdFast,I.macdSlow,I.macdSig); const ml=last(m),sl=last(sg);
  const a=atr(hc,lc,cc,I.atr)||price*0.05;
  const res30=mx(hc.slice(-I.resWin)), sup=mn(lc.slice(-I.resWin));
  const res90= hc.length>=I.res90Win? mx(hc.slice(-I.res90Win)):res30;
  const va= vc.length>=I.volAvgWin? vc.slice(-I.volAvgWin).reduce((x,y)=>x+y,0)/I.volAvgWin : 1;
  const vol_pace=vol[vol.length-1]/Math.max(elapsed,0.08);
  let wcl=[],i=cc.length; while(i>0&&wcl.length<12){ wcl.push(cc[i-1]); i-=7; }
  const w10= wcl.length>=10? wcl.slice(0,10).reduce((x,y)=>x+y,0)/10 : null;
  return {p:price,e20,e50,s200,rsi:r,macd:ml,sig:sl,atr:a,res:res30,res90,sup,
    vr: va? vol_pace/va : null,
    c7: cc.length>=7? (price/cc[cc.length-7]-1)*100 : null,
    c30: cc.length>=30? (price/cc[cc.length-30]-1)*100 : null, w10}; }

function headroom(a){ if(!a.res) return[null,null]; const p=a.p;
  if(p<a.res*0.995) return[(a.res-p)/p*100,"30일 저항"];
  if(a.res90>p*1.005) return[(a.res90-p)/p*100,"90일 매물대"]; return[99.0,null]; }

function score(a,btc7,regimePen){ const C=CONFIG; const s={}; const p=a.p;
  let t=0;
  if(a.e20&&p>a.e20) t+=C.trend.aboveEmaFast;
  if(a.e20&&a.e50&&a.e20>a.e50) t+=C.trend.emaFastOverSlow;
  if(a.s200&&p>a.s200) t+=C.trend.aboveSma;
  else if(a.s200==null&&a.e50&&p>a.e50) t+=C.trend.aboveEmaSlowIfNoSma;
  s["추세"]=t;
  let mo=0; const r=a.rsi; const M=C.momentum;
  if(r!=null){ if(r>=M.rsiSweetLo&&r<=M.rsiSweetHi) mo+=M.rsiSweetPts;
    else if((r>=M.rsiOkLo&&r<M.rsiSweetLo)||(r>M.rsiSweetHi&&r<=M.rsiOkHi)) mo+=M.rsiOkPts;
    else if(r>M.rsiHotTh) mo+=M.rsiHotPts; }
  if(a.macd!=null&&a.sig!=null&&a.macd>a.sig) mo+=M.macdUpPts; s["모멘텀"]=Math.max(mo,0);
  let v=0; const V=C.volume;
  if(a.vr&&a.vr>=V.strongTh) v+=V.strongPts; else if(a.vr&&a.vr>=V.okTh) v+=V.okPts; s["거래량"]=v;
  let su=0; const S=C.setup;
  if(a.sup&&a.res&&a.res>a.sup){ const pos=(p-a.sup)/(a.res-a.sup); su+= pos<=S.posLowTh?S.posLowPts:(pos<=S.posMidTh?S.posMidPts:0); }
  let [hr]=headroom(a);
  if(hr!=null) su+= hr>=S.hrFarTh?S.hrFarPts:(hr>=S.hrMidTh?S.hrMidPts:(hr<S.hrNearTh?S.hrNearPts:0)); s["셋업"]=Math.max(su,0);
  let rs=0; const R=C.relStr;
  if(a.c7!=null&&btc7!=null&&a.c7>btc7) rs+= (a.c7-btc7>R.bigGapTh)?R.bigGapPts:R.beatPts; s["상대강도"]=rs;
  let base=Object.values(s).reduce((x,y)=>x+y,0);
  let pen=0; const P=C.penalty; const c7=a.c7,vr=a.vr,r2=a.rsi;
  if(c7!=null){ if(c7>P.pumpHardTh) pen+=P.pumpHardPts; else if(c7>P.pumpSoftTh) pen+=P.pumpSoftPts; }
  if(c7!=null&&c7>P.pumpNoVolTh&&(vr==null||vr<P.pumpNoVolRatio)) pen+=P.pumpNoVolPts;
  if(r2!=null&&r2>P.rsiOverboughtTh) pen+=P.rsiOverboughtPts;
  if(hr!=null&&hr<P.resTooCloseTh) pen+=P.resTooClosePts;
  if(a.w10&&p<a.w10) pen+=P.belowWeeklyPts;
  if(P.noisyStopAtr*a.atr>P.noisyStopFrac*p) pen+=P.noisyStopPts;
  pen+=regimePen;   // 국면(regime) 감점: BTC<50일선·거래량위축·BTC주도장 합산 (build에서 계산)
  s["감점"]=pen;
  return [Math.max(0,Math.min(100,Math.round(base+pen))),s]; }

function rsiWord(r){ if(r==null) return"-";

function plan(a){ const P=CONFIG.plan; const p=a.p, atr_=a.atr; const sup=a.sup||(p-2*atr_);
  const t1=p*P.t1,t2=p*P.t2; const rs=Math.min(sup-P.supBuffer*atr_,p-P.atrStop*atr_);
  const m=(t1-p)/2; const stop=(p-rs)>m? p-m : rs;
  const risk=p-stop; const rr1= risk>0? Math.round((t1-p)/risk*100)/100 : null;
  const rr2= risk>0? Math.round((t2-p)/risk*100)/100 : null;
  let [hr,hsrc]=headroom(a); let hn;
  if(hr&&hr>=99) hn="신고가권(90일 내 매물대 없음)";
  else if(hr&&hr<10) hn=`⚠️ ${hsrc}까지 ${hr.toFixed(1)}%뿐`;
  else if(hr) hn=`${hsrc}까지 여유 ${hr.toFixed(1)}%`; else hn="";
  if(1.2*atr_>risk) hn+=" · ⚠️ 스탑<1.2×ATR 노이즈 위험(사이즈 축소)";
  return {elo:Math.max(sup,p-P.atrEntryLow*atr_),ehi:p,stop,sp:(stop/p-1)*100,t1,t2,rr1,rr2,hn}; }

function won(x){ if(x==null) return"-";

  if(x>=1) return x.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+"원";
  return x.toFixed(4)+"원"; }

function appendPredictions(log,rows,today){

async function evaluateLog(log,window=CONFIG.evalWindow){ let changed=0; const today=new Date();
  for(const e of log){
    if(e.status!=="pending") continue;
    const d0=new Date(e.date+"T00:00:00Z");
    const age=Math.floor((today-d0)/86400000);
    if(age<1) continue;
    let ds,h,l,c;
    try{ [ds,h,l,c]=await candDates(e.market); }catch(err){ continue; }
    const end=new Date(d0.getTime()+window*86400000).toISOString().slice(0,10);
    let hit=null,lastClose=null;
    for(let i=0;i<ds.length;i++){ const dstr=ds[i];
      if(dstr<=e.date||dstr>end) continue; lastClose=c[i];
      if(hit==null&&l[i]<=e.stop){ hit="stop"; break; }
      if(h[i]>=e.t2){ hit="t2"; break; }
      if(hit==null&&h[i]>=e.t1) hit="t1"; }
    const over=age>=window;
    if(hit==="stop"){ e.status="stop"; e.ret=e.stop/e.price-1; }
    else if(hit==="t2"){ e.status="t2"; e.ret=0.20; }
    else if(hit==="t1"&&over){ e.status="t1"; e.ret=0.10; }
    else if(hit==null&&over){ e.status="expire"; e.ret= lastClose? lastClose/e.price-1 : 0; }
    else continue;
    changed++; }
  return changed; }

function pruneLog(log){   // 평가완료 + 60일 초과 예측 자동 정리(로그 용량 관리). 대기 예측은 항상 유지
  const today=new Date();
  return log.filter(e=>{
    if(e.status==="pending") return true;
    const age=Math.floor((today-new Date(e.date+"T00:00:00Z"))/86400000);
    return age<=60;
  });
}

function perfSummary(log){   // 성과 통계 요약(화면·copytext 공용). 원본 로그가 아닌 '계산된 수치'만 반환
  const curV=CONFIG.version;
  const GRADES=[["🟢75+",75,101],["🟡60~74",60,75],["⚪45~59",45,60],["⛔<45",-1,45]];
  const done=(e)=>["stop","t1","t2","expire"].includes(e.status);

  const pend=log.filter(e=>e.status==="pending"&&(e.cfgVersion||"이전")===curV).length;
  const grades=[]; let small=true;
  for(const[label,lo,hi]of GRADES){ const g=ev.filter(e=>e.score>=lo&&e.score<hi);
    if(!g.length){ grades.push({label,n:0}); continue; }
    const n=g.length; if(n>=10) small=false;
    const t1=g.filter(e=>["t1","t2"].includes(e.status)).length;
    const st=g.filter(e=>e.status==="stop").length;
    grades.push({label,n,t1pct:t1/n*100,stoppct:st/n*100,avgpct:g.reduce((x,e)=>x+(e.ret||0),0)/n*100}); }
  const track=(arr)=>{ if(!arr.length) return {n:0}; const n=arr.length;
    return {n, avg:arr.reduce((x,e)=>x+(e.ret||0),0)/n*100,
      up:arr.filter(e=>(e.ret||0)>=0.10).length/n*100, down:arr.filter(e=>(e.ret||0)<=-0.05).length/n*100}; };
  const excl=track(ev.filter(e=>e.score<45)), surge=track(ev.filter(e=>e.was_surge));
  let exclVerdict;
  if(excl.n<10) exclVerdict="표본 부족/혼재, 관찰 지속";
  else if(excl.avg<0 && excl.down>50) exclVerdict="✅ 거르기 유효: 제외 종목 실제 하락";
  else if(excl.avg>5 && excl.up>50) exclVerdict="⚠️ 거르기 재검토: 제외 종목 실제 상승(기회 놓침 가능)";
  else exclVerdict="표본 부족/혼재, 관찰 지속";
  const upper=ev.filter(e=>e.score>=60).length;
  const guard=(small||upper<10)?"🚧 튜닝 보류(표본 부족)":"검증 가능(표본 충분)";
  return {curV, n:ev.length, pend, grades, excl, surge, exclVerdict, guard, hasData:ev.length>0};
}

  let small=true;

    const t1=g.filter(e=>["t1","t2"].includes(e.status)).length, t2=g.filter(e=>e.status==="t2").length;
    const st=g.filter(e=>e.status==="stop").length, ex=g.filter(e=>e.status==="expire").length;
    const ar=g.reduce((x,e)=>x+(e.ret||0),0)/n*100;

  h+=`</table><div class="meta">대기 등급 분포: ${pdistStr}</div>`;
  // 팩터 진단
  const diag=[];
  for(const[k,thr]of [["거래량",10],["셋업",8],["추세",30],["상대강도",6]]){

    if(hi.length&&lo.length){ const ah=hi.reduce((x,e)=>x+(e.ret||0),0)/hi.length*100, al=lo.reduce((x,e)=>x+(e.ret||0),0)/lo.length*100;
      diag.push(`${k}≥${thr}: ${ah>=0?"+":""}${ah.toFixed(1)}% vs 미만 ${al>=0?"+":""}${al.toFixed(1)}%`); } }

  const upper=ev.filter(e=>e.score>=60);
  if(small||upper.length<10)
    h+=`<div class="meta warn">🚧 튜닝 보류 권고: 표본 부족(🟢🟡 상위등급 평가 ${upper.length}건). 각 등급 n≥10 + 21일 창이 여러 번 완주해야 통계 유효. 지금 CONFIG 가중치 바꾸면 과적합 위험 — 데이터 쌓일 때까지 관찰만.</div>`;

/* ---------- 메인 빌드 ---------- */
async function build(shortlist){
  const SEL=CONFIG.select;
  setStatus("종목 목록 불러오는 중…"); setProg(0.03);
  const uni=await universe();
  setStatus("현재가·거래대금 불러오는 중…"); setProg(0.08);
  const tk=await tickers(uni.map(u=>u.market));
  const now=new Date();
  const elapsed=(now.getUTCHours()*3600+now.getUTCMinutes()*60+now.getUTCSeconds())/86400;
  setStatus("BTC 국면 분석 중…"); setProg(0.12);
  const btc=await daily("KRW-BTC",200); const btcCc=btc[2].slice(0,-1);
  const btc7= btcCc.length>=7? (btc[2][btc[2].length-1]/btcCc[btcCc.length-7]-1)*100 : null;
  const btcClose=btc[2][btc[2].length-1];
  const btcE50=last(ema(btcCc,CONFIG.ind.emaSlow));
  const riskoff=!!(btcE50&&btcClose<btcE50);              // 국면① BTC<50일선
  // 국면② 거래량 위축: BTC 일봉 거래대금(오늘 페이스보정) vs 최근 7일 완성캔들 평균
  const RG=CONFIG.regime; const btcTP=btc[4]||[];
  const tpDone=btcTP.slice(0,-1);
  const tpToday= btcTP.length? btcTP[btcTP.length-1]/Math.max(elapsed,0.08) : null;
  const tpAvg7= tpDone.length>=7? tpDone.slice(-7).reduce((x,y)=>x+y,0)/7 : null;
  const volContract=!!(tpToday!=null&&tpAvg7&&tpToday<tpAvg7*RG.volContractRatio);
  const mom=[],quiet=[];
  for(const u of uni){ const t=tk[u.market]; if(!t||(t.tv||0)<SEL.minTradeValue24h) continue;
    const liq=3*Math.max(Math.log10(t.tv+1)-8,0); const pen=u.warn?8:0; const ch=t.ch24;
    if(Math.abs(ch)<SEL.minAbsChange) continue;
    mom.push([SEL.momentumWeight*ch+liq-pen,u,t]); if(Math.abs(ch)<=SEL.quietMaxChange) quiet.push([liq-pen,u,t]); }
  mom.sort((a,b)=>b[0]-a[0]); quiet.sort((a,b)=>b[0]-a[0]);
  const nMom=Math.max(Math.floor(shortlist*SEL.momShareNum/SEL.momShareDen),1); const picked=new Map();
  for(const[,u,t]of mom.slice(0,nMom)) picked.set(u.market,[u,t]);
  for(const[,u,t]of quiet){ if(picked.size>=shortlist) break; if(!picked.has(u.market)) picked.set(u.market,[u,t]); }
  for(const[,u,t]of mom.slice(nMom)){ if(picked.size>=shortlist) break; if(!picked.has(u.market)) picked.set(u.market,[u,t]); }

  // 1차: 후보 분석 (추가 API 없음 — 국면③용 c7 수집)
  const anz=[],skipped=[]; const list=[...picked.values()]; let cnt=0;
  for(const[u,t]of list){ cnt++;
    setStatus(`분석 중 ${cnt}/${list.length} — ${u.symbol}`); setProg(0.15+0.65*cnt/list.length);
    let h,l,c,v; try{ [h,l,c,v]=await daily(u.market,200); }catch(e){ skipped.push(u.symbol); continue; }
    const a=analyze(h,l,c,v,elapsed); if(!a){ skipped.push(u.symbol); continue; }
    const [tr,tn]=tier(t.tv,u.warn); anz.push({a,u,t,tr,tn}); }
  // 국면③ BTC 주도장: btc7 > 후보(BTC 제외) c7 중앙값
  const c7s=anz.filter(x=>x.u.symbol!=="BTC").map(x=>x.a.c7).filter(v=>v!=null).sort((x,y)=>x-y);
  const medC7= c7s.length? (c7s.length%2? c7s[(c7s.length-1)/2] : (c7s[c7s.length/2-1]+c7s[c7s.length/2])/2) : null;
  const btcDom=!!(btc7!=null&&medC7!=null&&btc7>medC7);
  // 국면 종합 감점 + 켜진 플래그
  let regimePen=0; const flags=[];
  if(riskoff){ regimePen+=RG.btcBelowMa; flags.push("BTC 50일선 아래"); }
  if(volContract){ regimePen+=RG.volContract; flags.push("거래량 위축"); }
  if(btcDom){ regimePen+=RG.btcDominance; flags.push("BTC 주도장"); }
  // 2차: 국면 감점 반영해 스코어링
  const rows=[];
  for(const{a,u,t,tr,tn}of anz){
    const warnPen= u.warn?CONFIG.warning.warnPts:(u.caution?CONFIG.warning.cautionPts:0);  // 유의/주의 개별 감점
    const [sc,bd]=score(a,btc7,regimePen+warnPen); const pl=plan(a);
    rows.push([sc,bd,a,pl,u,tr,tn]); }
  rows.sort((a,b)=>b[0]-a[0]);
  return {rows,skipped,btc7,riskoff,regimePen,flags,now}; }

/* ---------- 렌더링 ---------- */
function gcls(sc){ return sc>=75?"g75":(sc>=60?"g60":(sc>=45?"g45":"g0")); }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function regimeLabel(pen){
  if(pen===0) return "🟢 리스크온 (BTC>50일선·거래량 유지·알트 순환)";
  if(pen>=-5) return "🟡 중립 (일부 약세 신호)";
  return "🔴 리스크오프 (약세 신호 겹침) — 스윙 비수기, 관망 권장"; }

function render(res,log,nEval){
  const {rows,skipped,btc7,regimePen,flags,now}=res;
  const nows=now.toISOString().slice(0,16).replace("T"," ")+" UTC";
  let h=`<div class="meta">업비트 스윙 후보 — ${nows} · 규칙 ${CONFIG.version}<br>
    KRW 상장만 · 목표 +10~20% · 완성 일봉 기준(오늘 캔들 제외)<br>
    BTC 7일 ${btc7==null?"-":(btc7>=0?"+":"")+btc7.toFixed(1)+"%"} · 국면: ${regimeLabel(regimePen)}${(flags&&flags.length)?`<br>&nbsp;&nbsp;↳ 켜진 신호: ${flags.join(" · ")} (전 후보 ${regimePen})`:""}</div>`;
  h+=`<div class="meta">점수만 보면 됨: 🟢75+ 강한 진입 · 🟡60~74 조건부 · ⚪45~59 관망 · ⛔45미만 제외. 급등추격·거래량부재·저항코앞·주봉역추세 등 자동 감점.</div>`;

  if(!rows.length) h+=`<div class="card">통과 후보 없음.</div>`;
  rows.forEach(([sc,bd,a,pl,u,tr,tn],idx)=>{
    const mm=(a.macd!=null&&a.sig!=null&&a.macd>a.sig)?"▲골든(단기 상승신호)":"▽데드(단기 하락신호)";
    const pentxt=bd["감점"]?` · 감점 ${bd["감점"]}`:"";
    const wk=(a.w10&&a.p>=a.w10)?"위쪽(장기 흐름 양호)":"⚠️아래쪽(장기 하락 중)";
    const cReason=(u.cautionReasons&&u.cautionReasons.length)?u.cautionReasons.join("·"):"주의환기";
    const wbadge= u.warn?` <span style="background:#3a1720;color:#ff8ba0;font-size:12px;font-weight:800;padding:2px 7px;border-radius:7px">🚨유의종목</span>`
                 :(u.caution?` <span style="background:#3d340f;color:#ffd257;font-size:12px;font-weight:700;padding:2px 7px;border-radius:7px">⚠️${esc(cReason)} 주의</span>`:"");
    const warnLead= u.warn?"⚠️ 업비트 투자유의 지정 — 상폐 위험, 진입 금지 — "
                  :(u.caution?`⚠️ 업비트 ${cReason} 주의 — 급변동 위험 — `:"");
    h+=`<div class="card">
      <h3><span class="sym">${idx+1}. ${esc(u.symbol)}</span> <span class="kname">${esc(u.name||"")}</span>
        <span class="sc ${gcls(sc)}">${sc} ${verdict(sc)}</span>${wbadge}</h3>
      <div class="easy">💬 ${esc(warnLead)}${esc(plainSummary(sc,bd,a,pl))}</div>`;
    if(a.rsi!=null){
      h+=`<div class="line">${tr} ${tn} · 추세${bd["추세"]}/모멘텀${bd["모멘텀"]}/거래량${bd["거래량"]}/셋업${bd["셋업"]}/상대강도${bd["상대강도"]}${pentxt}</div>
        <div class="line">현재가 ${won(a.p)} · RSI ${rsiWord(a.rsi)} · MACD ${mm} · 거래량 ${a.vr!=null?a.vr.toFixed(2)+"배(20일 평균 대비)":"-"}</div>`;
    } else h+=`<div class="line">${tr} ${tn}</div>`;
    h+=`<div class="line">최근 7일 ${a.c7>=0?"+":""}${a.c7.toFixed(1)}% / 30일 ${a.c30>=0?"+":""}${a.c30.toFixed(1)}% · 큰 흐름(주봉): ${wk}</div>
      <div class="plan">📋 <b>플랜:</b> ${won(pl.elo)}~${won(pl.ehi)}에 사서 → <b>${won(pl.stop)}(${pl.sp>=0?"+":""}${pl.sp.toFixed(1)}%)</b> 밑돌면 손절 → ${won(pl.t1)}(+10%)·${won(pl.t2)}(+20%) 익절<br>
        · RR(손익비) ${pl.rr1} (2 이상이면 유리)<br>
        · ${esc(pl.hn)}</div></div>`;
  });
  if(skipped.length) h+=`<div class="meta">데이터 부족/신규상장 제외: ${skipped.join(", ")}</div>`;

  h+=perfStats(log);
  h+=`<div class="meta">이번 실행 평가 ${nEval}건 · 누적 기록 ${log.length}건 (이 폰에 저장)</div>`;

  /* 복사 요약 */
  const svW=(sc)=>sc>=75?"강":(sc>=60?"관심":(sc>=45?"관망":"제외"));
  const c7f=(x)=>x.c7!=null?`${x.c7>=0?"+":""}${x.c7.toFixed(0)}%`:"-";
  const names=rows.filter(x=>x[4].name).map(x=>`${x[4].symbol}=${x[4].name}`).join(", ");
  const syms=rows.map(x=>x[4].symbol).join(", ");
  const regShort= regimePen===0?"🟢 리스크온":(regimePen>=-5?"🟡 중립":"🔴 리스크오프");
  const flagTxt= (flags&&flags.length)?flags.join(" · "):"없음";
  const btcTxt= btc7==null?"-":(btc7>=0?"+":"")+btc7.toFixed(1)+"%";
  const detail=rows.map(x=>`${x[4].symbol}${x[4].warn?"🚨":""}(${x[0]}${svW(x[0])},7d${c7f(x[2])})`).join(" · ");
  const psum=perfSummary(log);   // 성과 통계(계산된 요약만, 원본 로그 미포함)
  let perfBlock;
  if(!psum.hasData){ perfBlock=`[성과] 아직 평가 완료 없음·대기 ${psum.pend}건\n`; }
  else {
    const gStr=psum.grades.filter(g=>g.n).map(g=>`${g.label} n${g.n}·T1 ${g.t1pct.toFixed(0)}%·스탑 ${g.stoppct.toFixed(0)}%·평균 ${g.avgpct>=0?"+":""}${g.avgpct.toFixed(1)}%`).join(" / ")||"-";
    const eT=psum.excl.n?`n${psum.excl.n}·평균 ${psum.excl.avg>=0?"+":""}${psum.excl.avg.toFixed(1)}%·상승 ${psum.excl.up.toFixed(0)}%·하락 ${psum.excl.down.toFixed(0)}%`:"n0";
    const sT=psum.surge.n?`n${psum.surge.n}·평균 ${psum.surge.avg>=0?"+":""}${psum.surge.avg.toFixed(1)}%·상승 ${psum.surge.up.toFixed(0)}%·하락 ${psum.surge.down.toFixed(0)}%`:"n0";
    perfBlock=`[성과] 규칙 ${CONFIG.version} · 평가 ${psum.n}건 · 대기 ${psum.pend}건\n등급별(n·T1%·스탑%·평균): ${gStr}\n제외추적(<45 사후): ${eT}\n급등제외(7d+15%↑): ${sT}\n가드레일: ${psum.guard}\n`;
  }
  const copytext=`[심볼] ${syms}\n[종목명] ${names}\n[국면] ${regShort} · BTC7일 ${btcTxt} · 켜진신호: ${flagTxt} · 규칙 ${CONFIG.version}\n[상세] ${detail}\n${perfBlock}→ 업비트 스윙 후보야. [상세]숫자=총점,🚨=유의종목(진입금지). [성과]는 자기검증 통계. 동향 조사 + (성과 있으면)거르기 로직 유효성 판단 도와줘.`;
  h+=`<div class="copybox"><b>📋 클로드에 넘길 요약</b>
    <textarea id="cpb" readonly>${esc(copytext)}</textarea>
    <button id="copyBtn">복사</button>
    <div class="disc" style="margin:8px 2px 0">복사 → 클로드에 붙여넣기. 성과 표가 쌓이면 그것도 함께 붙여 CONFIG 튜닝 요청.</div></div>`;

  /* 로그 백업 */
  h+=`<div class="copybox"><b>💾 로그 백업</b>
    <div class="disc" style="margin:6px 2px 0">예측 기록은 이 폰에만 저장됩니다. 내보내서 백업하거나, 새 폰/PC에서 불러오세요. (파일을 클로드에 첨부하면 심층 분석도 가능)</div>
    <div class="row" style="margin-top:10px">
      <button id="expBtn" class="btn2">내보내기(JSON)</button>
      <button id="impBtn" class="btn2">불러오기</button>
      <input id="impFile" type="file" accept="application/json,.json" style="display:none">
    </div></div>`;

  h+=`<details><summary>📖 용어 설명 (처음이면 펼쳐보세요)</summary>
    <div class="line">• <b>점수(0~100)</b>: 높을수록 지금 사기 좋은 자리. 75+ 강함 / 60~74 조건부 / 45~59 관망 / 45미만 피함.<br>
    • <b>RSI</b>: 상승·하락 힘의 균형(0~100). 50 근처 무난, 70↑ 과열, 30↓ 침체.<br>
    • <b>MACD 골든/데드</b>: 단기 추세가 위로(골든)/아래로(데드) 도는 신호.<br>
    • <b>거래량 N배</b>: 20일 평균 대비 오늘 몰린 돈. 1.2배↑면 관심 붙는 중.<br>
    • <b>주봉 위/아래</b>: 주 단위 큰 흐름. 아래쪽이면 반등이어도 역추세라 위험.<br>
    • <b>진입존/스탑/목표</b>: 살 가격대 / 손절 / 익절(+10%·+20%).<br>
    • <b>RR(손익비)</b>: 잃을 위험 대비 노리는 수익. 높을수록 유리.<br>
    • <b>저항/매물대</b>: 위에서 팔 사람 많아 잘 못 뚫는 가격대.<br>
    • <b>감점</b>: 급등·거래량없음·손절빡빡·장기하락 등 위험요소 차감.<br>
    • <b>T1/T2/T3</b>: 코인 규모(유동성) 등급. T3=작은 코인(급변 위험 큼).</div></details>`;

  h+=`<div class="disc">⚠️ 매수 권유가 아니라 참고용 스크리닝입니다. 진입 전 업비트 공지·뉴스를 직접 확인하고(DYOR), 한 번에 잃을 돈은 총자본의 1~2%로 제한하세요. +10~20%는 목표선이지 도달 보장이 아닙니다. 점수 기준은 아직 검증 중인 임시 설정입니다.</div>`;

  out.innerHTML=h;

  const cbtn=$("#copyBtn"), ta=$("#cpb");
  cbtn.onclick=async()=>{ try{ await navigator.clipboard.writeText(copytext); }
    catch(e){ ta.focus(); ta.select(); try{document.execCommand("copy");}catch(_){} }
    cbtn.textContent="복사됨 ✓"; cbtn.style.background="#35C28B"; };

  $("#expBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(log,null,1)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`swing_log_${todayUTC()}.json`;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); };
  $("#impBtn").onclick=()=>$("#impFile").click();
  $("#impFile").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ const inc=JSON.parse(rd.result);
      if(!Array.isArray(inc)) throw new Error("배열 형식이 아님");
      const cur=loadLog(); const have=new Set(cur.map(x=>x.date+"|"+x.symbol));
      let added=0; for(const x of inc){ if(x&&x.date&&x.symbol&&!have.has(x.date+"|"+x.symbol)){ cur.push(x); have.add(x.date+"|"+x.symbol); added++; } }
      saveLog(cur); alert(`불러오기 완료: ${added}건 추가 (총 ${cur.length}건).\n[실행]을 다시 누르면 반영됩니다.`);
    }catch(err){ alert("불러오기 실패: "+err.message); } };
    rd.readAsText(f); };
}

/* ---------- 실행 ---------- */
async function run(){
  runBtn.disabled=true; out.innerHTML=""; setProg(0);
  const shortlist=parseInt($("#n").value,10);
  try{
    let log=loadLog();
    setStatus("이전 예측 자동 평가 중…");
    const nEval=await evaluateLog(log);
    const res=await build(shortlist);
    appendPredictions(log,res.rows,todayUTC());
    log=pruneLog(log);              // 평가완료 60일 초과 정리(로그 용량 관리)
    saveLog(log);
    setProg(1); setStatus(`완료 · 후보 ${res.rows.length}개 · 평가 ${nEval}건 · 규칙 ${CONFIG.version}`);
    render(res,log,nEval);
  }catch(e){
    setStatus("오류: "+e.message);
    out.innerHTML=`<div class="card warn">실행 중 오류가 났습니다: ${esc(e.message)}<br>잠시 후(업비트 요청 제한 가능) 다시 [실행]을 눌러보세요.</div>`;
  }finally{ runBtn.disabled=false; }
}
runBtn.addEventListener("click",run);
</script>
