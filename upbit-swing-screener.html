/* ══════════════════════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  // ▼ 업비트 요청이 "Failed to fetch"로 막히면(한국 IP rate limit) 아래를 본인 Cloudflare Worker 주소로 교체.

  version: "v10.3",      // ← v10.3: 200일선 페이징 수정(채점 실제 변경) — 이전 버전과 점수 분포가 다름

  statsCompatible: ["v10.3"],
  evalWindow: 21,        // 예측 유효기간(일). 이 안에 목표/손절 안 닿으면 만료 처리

    nearResTh:0.10,        // 저항 '가깝다' 기준(10% 이내)

    simK:[1.0,1.5,2.0,2.5,3.0],   // Phase4 스탑 배수 시뮬(리포트 전용)
  },

    emaFast:20, emaSlow:50, smaLong:200, rsi:14,

    rsiOkLo:40, rsiOkHi:70, rsiOkPts:7,            // 40~45 또는 65~70 = 무난
    rsiHotTh:78, rsiHotPts:-5,                     // 78 초과 = 과열 감점

  },

  },

    pumpHardTh:25, pumpHardPts:-12,   // 이미 급등

    pumpNoVolTh:10, pumpNoVolRatio:0.9, pumpNoVolPts:-8,  // 올랐는데 거래량 없음
    rsiOverboughtTh:75, rsiOverboughtPts:-6,
    resTooCloseTh:6, resTooClosePts:-6,  // 저항까지 6%뿐
    belowWeeklyPts:-6,                   // 주봉 아래(역추세)
    noisyStopAtr:1.2, noisyStopFrac:0.05, noisyStopPts:-5,  // 스탑 노이즈 위험
  },
  regime: {              // 국면(regime) 감점 — 전 후보에 공통 적용 (v8.0 신규)
    btcBelowMa:-5,          // ① BTC < 50일선 (기존값 유지)
    volContract:-3,         // ② 거래량 위축 (업비트 자금 유입 둔화)
    volContractRatio:0.8,   //    BTC 일봉 거래대금(오늘·페이스보정) < 7일평균 × 이 값 → 위축
    btcDominance:-2,        // ③ BTC 주도장 (btc7 > 후보 c7 중앙값 → 알트 소외)
  },
  warning: {             // 업비트 마켓 이벤트 감점 (v9.0 신규) — 전 후보 개별 적용
    warnPts:-25,            // 투자유의(market_event.warning) — 상폐 위험, 사실상 제외권으로
    cautionPts:-15,         // 주의환기(caution: 거래량급증·가격급등락 등) — 업비트 "위험" 표기, 급등 회피 강화
  },
  plan: {                // 진입/손절/목표
    t1:1.10, t2:1.20,        // 목표가 배수(+10%·+20%)
    atrEntryLow:1.0,         // 진입존 하단 = max(지지, 현재가 - N×ATR)
    supBuffer:0.5, atrStop:1.8,  // 원손절 후보 = min(지지-0.5×ATR, 현재가-1.8×ATR)
  },
  select: {              // 후보 선정
    minTradeValue24h:5e8,   // 최소 24h 거래대금(원)
    minAbsChange:0.3,       // |24h 등락|이 이 미만이면 제외
    quietMaxChange:3.0,     // |등락|이 이 이하면 '조용한' 후보로도 편입
    momentumWeight:0.6,     // 모멘텀 정렬 = 0.6×등락 + 유동성
    momShareNum:3, momShareDen:5,  // 후보의 3/5는 모멘텀, 나머지는 조용한 종목
  },
  tier: { t1Th:1e11, t2Th:2e10 },  // 유동성 등급 경계(거래대금)
};
const UP=CONFIG.apiBase;

const $=(s)=>document.querySelector(s);
const out=$("#out"), statusEl=$("#status"), pbar=$("#pbar"), runBtn=$("#run");
$("#vtag").textContent=CONFIG.version+" · web·r20";
function setStatus(t){statusEl.textContent=t}
function setProg(f){pbar.style.width=Math.max(0,Math.min(1,f))*100+"%"}
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

/* ---------- throttled fetch (429 대비) ---------- */
let _last=0;
async function gj(url,retries=6,gap=200){
  let err=null;
  for(let i=0;i<retries;i++){
    const wait=gap-(Date.now()-_last);
    if(wait>0) await sleep(wait);
    _last=Date.now();
    try{
      const r=await fetch(url,{headers:{Accept:"application/json"},cache:"no-store"});
      if(r.status===429){ err=new Error("HTTP 429(요청 제한)"); await sleep(800*(i+1)); continue; }
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){ err=e; await sleep(500*(i+1)); }
  }
  throw new Error("GET fail "+url.slice(0,80)+"… — "+(err&&err.message||err));
}

/* ---------- 지표 ---------- */
function ema(v,p){ if(v.length<p) return v.map(()=>null);
  const o=v.map(()=>null); const k=2/(p+1); let s=0;
  for(let i=0;i<p;i++) s+=v[i]; s/=p; o[p-1]=s; let pr=s;
  for(let i=p;i<v.length;i++){ pr=v[i]*k+pr*(1-k); o[i]=pr; } return o; }
function sma(v,p){ const o=v.map(()=>null); let r=0;
  for(let i=0;i<v.length;i++){ r+=v[i]; if(i>=p) r-=v[i-p]; if(i>=p-1) o[i]=r/p; } return o; }
function rsi(v,p=14){ const o=v.map(()=>null); if(v.length<=p) return o;
  let g=0,l=0; for(let i=1;i<=p;i++){ const d=v[i]-v[i-1]; g+=Math.max(d,0); l+=Math.max(-d,0); }
  let ag=g/p, al=l/p; o[p]= al? 100-100/(1+ag/al):100;
  for(let i=p+1;i<v.length;i++){ const d=v[i]-v[i-1];
    ag=(ag*(p-1)+Math.max(d,0))/p; al=(al*(p-1)+Math.max(-d,0))/p;
    o[i]= al? 100-100/(1+ag/al):100; } return o; }
function macd(v,f=12,s=26,sig=9){ const ef=ema(v,f), es=ema(v,s); const m=v.map(()=>null);
  for(let i=0;i<v.length;i++) if(ef[i]!=null&&es[i]!=null) m[i]=ef[i]-es[i];
  const val=[]; m.forEach((x,i)=>{ if(x!=null) val.push([i,x]); }); const sg=v.map(()=>null);
  if(val.length>=sig){ const seq=val.map(x=>x[1]); const e=ema(seq,sig);
    val.forEach((pair,idx)=>{ sg[pair[0]]=e[idx]; }); } return [m,sg]; }
function atr(h,l,c,p=14){ const n=c.length; const tr=new Array(n).fill(0);
  for(let i=0;i<n;i++) tr[i]= i===0? h[i]-l[i]: Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1]));
  if(n<=p) return null; let a=0; for(let i=1;i<=p;i++) a+=tr[i]; a/=p;
  for(let i=p+1;i<n;i++) a=(a*(p-1)+tr[i])/p; return a; }
function last(x){ for(let i=x.length-1;i>=0;i--) if(x[i]!=null) return x[i]; return null; }
const mx=(a)=>Math.max.apply(null,a), mn=(a)=>Math.min.apply(null,a);

/* ---------- 업비트 데이터 ---------- */
const CAUTION_LABELS={PRICE_FLUCTUATIONS:"가격급등락",TRADING_VOLUME_SOARING:"거래량급증",DEPOSIT_AMOUNT_SOARING:"입금량급증",GLOBAL_PRICE_DIFFERENCES:"가격괴리",CONCENTRATION_OF_SMALL_ACCOUNTS:"소액집중"};
async function universe(){ const d=await gj(`${UP}/market/all?isDetails=true`); const o=[];
  for(const m of d){ const mk=m.market||"";
    if(mk.startsWith("KRW-")){ const ev=m.market_event||{}; const cev=(ev&&ev.caution)||{};
      const cReasons=Object.keys(cev).filter(k=>cev[k]).map(k=>CAUTION_LABELS[k]||k);
      o.push({market:mk,symbol:mk.slice(4),name:m.korean_name,warn:!!(ev&&ev.warning),
        caution:cReasons.length>0,cautionReasons:cReasons}); } } return o; }
async function tickers(mks){ const o={};
  for(let i=0;i<mks.length;i+=30){ const q=encodeURIComponent(mks.slice(i,i+30).join(","));
    for(const t of await gj(`${UP}/ticker?markets=${q}`))
      o[t.market]={price:t.trade_price,ch24:(t.signed_change_rate||0)*100,tv:t.acc_trade_price_24h||0}; }
  return o; }
// ★페이징: 업비트 count 상한 200 → to 파라미터로 이어붙여 200일선 계산에 필요한 봉수 확보
async function dailyRaw(mk,cnt){
  const out=[], seen=new Set(); let to=null;
  while(out.length<cnt){
    const need=Math.min(200,cnt-out.length);
    const d=await gj(`${UP}/candles/days?market=${mk}&count=${need}`+(to?`&to=${encodeURIComponent(to)}`:""));
    if(!d||!d.length) break;
    let added=0;
    for(const x of d){ const k=x.candle_date_time_utc; if(seen.has(k)) continue; seen.add(k); out.push(x); added++; }
    if(!added) break;
    to=d[d.length-1].candle_date_time_utc;
    if(d.length<need) break;                       // 상장 초기까지 도달 → 더 없음
  }
  return out.sort((a,b)=> a.candle_date_time_utc<b.candle_date_time_utc? -1:1);   // 오래된→최신
}
async function daily(mk,cnt=CONFIG.ind.candleCount){ const d=await dailyRaw(mk,cnt);
  return [d.map(c=>c.high_price),d.map(c=>c.low_price),d.map(c=>c.trade_price),d.map(c=>c.candle_acc_trade_volume),d.map(c=>c.candle_acc_trade_price)]; }

/* 자기검증용: 날짜 포함 캔들 (캐시) */
const _candCache={};
async function candDates(mk){ if(!_candCache[mk]){ const d=(await gj(`${UP}/candles/days?market=${mk}&count=200`)).reverse();
  _candCache[mk]=[d.map(c=>c.candle_date_time_utc.slice(0,10)),d.map(c=>c.high_price),d.map(c=>c.low_price),d.map(c=>c.trade_price)]; }
  return _candCache[mk]; }

/* ---------- 리스크 티어 ---------- */
function tier(tv,warn){ if(warn) return["🔴 T3","⚠️유의종목"];
  if(tv>=CONFIG.tier.t1Th) return["🟢 T1","고유동성"];
  if(tv>=CONFIG.tier.t2Th) return["🟡 T2","중유동성"]; return["🔴 T3","저유동성"]; }

/* ---------- 분석 ---------- */
function analyze(h,l,c,vol,elapsed=1.0){
  const I=CONFIG.ind;
  if(c.length<62) return null;
  const hc=h.slice(0,-1),lc=l.slice(0,-1),cc=c.slice(0,-1),vc=vol.slice(0,-1);
  const price=c[c.length-1];
  const e20=last(ema(cc,I.emaFast)),e50=last(ema(cc,I.emaSlow));
  const s200= cc.length>=I.smaLong? last(sma(cc,I.smaLong)):null;
  const r=last(rsi(cc,I.rsi)); const [m,sg]=macd(cc,I.macdFast,I.macdSlow,I.macdSig); const ml=last(m),sl=last(sg);
  const a=atr(hc,lc,cc,I.atr)||price*0.05;
  const res30=mx(hc.slice(-I.resWin)), sup=mn(lc.slice(-I.resWin));
  const res90= hc.length>=I.res90Win? mx(hc.slice(-I.res90Win)):res30;
  const va= vc.length>=I.volAvgWin? vc.slice(-I.volAvgWin).reduce((x,y)=>x+y,0)/I.volAvgWin : 1;
  const vol_pace=vol[vol.length-1]/Math.max(elapsed,0.08);
  let wcl=[],i=cc.length; while(i>0&&wcl.length<12){ wcl.push(cc[i-1]); i-=7; }
  const w10= wcl.length>=10? wcl.slice(0,10).reduce((x,y)=>x+y,0)/10 : null;
  const c7v= cc.length>=7? (price/cc[cc.length-7]-1)*100 : null;
  // 측정 전용 지표(점수 미반영): EMA 정배열 · 급등유형 · spike_share · 저항×추세
  const e5v=last(ema(cc,5)), e10v=last(ema(cc,10)), e60v=last(ema(cc,60));
  const aligned=!!(e5v!=null&&e10v!=null&&e20!=null&&e60v!=null&&e5v>e10v&&e10v>e20&&e20>e60v);
  let max1d=null;
  for(let j=Math.max(1,cc.length-20); j<cc.length; j++){ const r=(cc[j]/cc[j-1]-1)*100; if(max1d==null||r>max1d) max1d=r; }
  const ret30v= cc.length>=31? (price/cc[cc.length-31]-1)*100 : null;
  const spikeShare= (ret30v!=null&&ret30v>0&&max1d!=null)? max1d/ret30v : null;
  let spike5=false;
  for(let j=Math.max(1,cc.length-5); j<cc.length; j++){ if(cc[j-1]>0&&(cc[j]/cc[j-1]-1)*100>=15){ spike5=true; break; } }
  let surgeT="normal";
  if(c7v!=null&&c7v>=15) surgeT=(aligned&&!spike5)?"trend":"spike";
  let resAbv=null; if(res30>price) resAbv=res30; else if(res90>price) resAbv=res90;
  const resDistV= resAbv!=null? (resAbv/price-1) : null;
  const resXTrend=((resDistV!=null&&resDistV<CONFIG.measure.nearResTh)?"near_":"far_")+(aligned?"alive":"dead");
  return {p:price,e20,e50,s200,rsi:r,macd:ml,sig:sl,atr:a,res:res30,res90,sup,
    vr: va? vol_pace/va : null,
    c7: c7v,
    c30: cc.length>=30? (price/cc[cc.length-30]-1)*100 : null, w10, surgeType:surgeT,
    spikeShare, resXTrend, alignedEma:aligned,
    s200Missing:(s200==null), barCount:cc.length}; }   // [2] 신규상장 등 200일선 미확보 → 폴백 +5 받는 버킷 추적용

function headroom(a){ if(!a.res) return[null,null]; const p=a.p;
  if(p<a.res*0.995) return[(a.res-p)/p*100,"30일 저항"];
  if(a.res90>p*1.005) return[(a.res90-p)/p*100,"90일 매물대"]; return[99.0,null]; }

function score(a,btc7,regimePen){ const C=CONFIG; const s={}; const p=a.p;
  let t=0;
  if(a.e20&&p>a.e20) t+=C.trend.aboveEmaFast;
  if(a.e20&&a.e50&&a.e20>a.e50) t+=C.trend.emaFastOverSlow;
  if(a.s200&&p>a.s200) t+=C.trend.aboveSma;
  else if(a.s200==null&&a.e50&&p>a.e50) t+=C.trend.aboveEmaSlowIfNoSma;
  s["추세"]=t;
  let mo=0; const r=a.rsi; const M=C.momentum;
  if(r!=null){ if(r>=M.rsiSweetLo&&r<=M.rsiSweetHi) mo+=M.rsiSweetPts;
    else if((r>=M.rsiOkLo&&r<M.rsiSweetLo)||(r>M.rsiSweetHi&&r<=M.rsiOkHi)) mo+=M.rsiOkPts;
    else if(r>M.rsiHotTh) mo+=M.rsiHotPts; }
  if(a.macd!=null&&a.sig!=null&&a.macd>a.sig) mo+=M.macdUpPts; s["모멘텀"]=Math.max(mo,0);
  let v=0; const V=C.volume;
  if(a.vr&&a.vr>=V.strongTh) v+=V.strongPts; else if(a.vr&&a.vr>=V.okTh) v+=V.okPts; s["거래량"]=v;
  let su=0; const S=C.setup;
  if(a.sup&&a.res&&a.res>a.sup){ const pos=(p-a.sup)/(a.res-a.sup); su+= pos<=S.posLowTh?S.posLowPts:(pos<=S.posMidTh?S.posMidPts:0); }
  let [hr]=headroom(a);
  if(hr!=null) su+= hr>=S.hrFarTh?S.hrFarPts:(hr>=S.hrMidTh?S.hrMidPts:(hr<S.hrNearTh?S.hrNearPts:0)); s["셋업"]=Math.max(su,0);
  let rs=0; const R=C.relStr;
  if(a.c7!=null&&btc7!=null&&a.c7>btc7) rs+= (a.c7-btc7>R.bigGapTh)?R.bigGapPts:R.beatPts; s["상대강도"]=rs;
  let base=Object.values(s).reduce((x,y)=>x+y,0);
  let pen=0; const P=C.penalty; const c7=a.c7,vr=a.vr,r2=a.rsi;
  if(c7!=null){ if(c7>P.pumpHardTh) pen+=P.pumpHardPts; else if(c7>P.pumpSoftTh) pen+=P.pumpSoftPts; }
  if(c7!=null&&c7>P.pumpNoVolTh&&(vr==null||vr<P.pumpNoVolRatio)) pen+=P.pumpNoVolPts;
  if(r2!=null&&r2>P.rsiOverboughtTh) pen+=P.rsiOverboughtPts;
  if(hr!=null&&hr<P.resTooCloseTh) pen+=P.resTooClosePts;
  if(a.w10&&p<a.w10) pen+=P.belowWeeklyPts;
  if(P.noisyStopAtr*a.atr>P.noisyStopFrac*p) pen+=P.noisyStopPts;
  pen+=regimePen;   // 국면(regime) 감점: BTC<50일선·거래량위축·BTC주도장 합산 (build에서 계산)
  s["감점"]=pen;
  return [Math.max(0,Math.min(100,Math.round(base+pen))),s]; }

function verdict(sc){ if(sc>=75) return"🟢 강한 진입"; if(sc>=60) return"🟡 조건부 관심";

function rsiWord(r){ if(r==null) return"-";

  if(r>=45) return`${r.toFixed(0)}(무난한 중간 구간)`; if(r>=30) return`${r.toFixed(0)}(약세)`;

function plan(a){ const P=CONFIG.plan; const p=a.p, atr_=a.atr; const sup=a.sup||(p-2*atr_);
  const t1=p*P.t1,t2=p*P.t2; const rs=Math.min(sup-P.supBuffer*atr_,p-P.atrStop*atr_);
  const m=(t1-p)/2; const stop=(p-rs)>m? p-m : rs;
  const risk=p-stop; const rr1= risk>0? Math.round((t1-p)/risk*100)/100 : null;
  const rr2= risk>0? Math.round((t2-p)/risk*100)/100 : null;
  let [hr,hsrc]=headroom(a); let hn;
  if(hr&&hr>=99) hn="신고가권(90일 내 매물대 없음)";
  else if(hr&&hr<10) hn=`⚠️ ${hsrc}까지 ${hr.toFixed(1)}%뿐`;
  else if(hr) hn=`${hsrc}까지 여유 ${hr.toFixed(1)}%`; else hn="";
  if(1.2*atr_>risk) hn+=" · ⚠️ 스탑<1.2×ATR 노이즈 위험(사이즈 축소)";
  return {elo:Math.max(sup,p-P.atrEntryLow*atr_),ehi:p,stop,sp:(stop/p-1)*100,t1,t2,rr1,rr2,hn}; }

function won(x){ if(x==null) return"-";
  if(x>=100) return Math.round(x).toLocaleString()+"원";
  if(x>=1) return x.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+"원";
  return x.toFixed(4)+"원"; }

async function evaluateLog(log,window=CONFIG.evalWindow){ let changed=0; const today=new Date();
  for(const e of log){
    if(e.status!=="pending") continue;
    const d0=new Date(e.date+"T00:00:00Z");
    const age=Math.floor((today-d0)/86400000);
    if(age<1) continue;
    let ds,h,l,c;
    try{ [ds,h,l,c]=await candDates(e.market); }catch(err){ continue; }
    const end=new Date(d0.getTime()+window*86400000).toISOString().slice(0,10);
    let hit=null,lastClose=null;
    for(let i=0;i<ds.length;i++){ const dstr=ds[i];
      if(dstr<=e.date||dstr>end) continue; lastClose=c[i];
      if(hit==null&&l[i]<=e.stop){ hit="stop"; break; }
      if(h[i]>=e.t2){ hit="t2"; break; }
      if(hit==null&&h[i]>=e.t1) hit="t1"; }
    const over=age>=window;
    if(hit==="stop"){ e.status="stop"; e.ret=e.stop/e.price-1; }
    else if(hit==="t2"){ e.status="t2"; e.ret=0.20; }
    else if(hit==="t1"&&over){ e.status="t1"; e.ret=0.10; }
    else if(hit==null&&over){ e.status="expire"; e.ret= lastClose? lastClose/e.price-1 : 0; }
    else continue;
    changed++; }
  return changed; }

const MKT_RE=/^KRW-[A-Z0-9]+$/;

function mktOf(e){ return e.market||(e.symbol?("KRW-"+e.symbol):""); }

// 오염 스캔(dry-run 전용, 삭제 안 함). 확정/의심을 분리 — 상폐 코인 오판 방지
function scanContamination(log, validSet){
  const confirmed=[], suspect=[], reasons={};
  const bump=(r)=>{ reasons[r]=(reasons[r]||0)+1; };
  for(const e of log){
    if(!e||typeof e!=="object") continue;
    const mk=mktOf(e); const rs=[];
    if(!MKT_RE.test(mk)) rs.push("마켓형식 불일치");
    const sf=STOCK_FIELDS.filter(k=>e[k]!==undefined);
    if(sf.length) rs.push("주식필드("+sf.slice(0,3).join(",")+")");
    if(/^v3\./.test(e.cfgVersion||"")) rs.push("주식버전 v3.x");
    if(rs.length){ rs.forEach(bump); confirmed.push({e,rs}); continue; }
    if(validSet&&validSet.size&&!validSet.has(mk)){ bump("업비트 현재목록에 없음(상폐 가능)"); suspect.push({e,rs:["업비트 현재목록에 없음"]}); }
  }
  const uniq=(arr)=>[...new Set(arr.map(x=>x.e.symbol||mktOf(x.e)))];
  return {total:log.length, confirmed, suspect, reasons,
    confirmedSyms:uniq(confirmed), suspectSyms:uniq(suspect),
    afterRemoveConfirmed: log.length-confirmed.length,
    afterRemoveBoth: log.length-confirmed.length-suspect.length};
}

// 임포트 관용 파서: 배열 / {log:[...]} / 객체맵 / NDJSON 등 흔한 형태를 자동 인식. 실패 시 원인 진단 메시지
function toRecords(txt){
  const t=String(txt).replace(/^﻿/,"").trim();
  if(!t) throw new Error("파일이 비어 있음");
  let data=null, note="";
  try{ data=JSON.parse(t); }
  catch(e){                                  // NDJSON(줄마다 JSON) 시도
    const arr=[]; for(const l of t.split(/\r?\n/)){ const s=l.trim().replace(/,$/,""); if(!s) continue;
      try{ const o=JSON.parse(s); if(o&&typeof o==="object") arr.push(o); }catch(_){} }
    if(arr.length) return {recs:arr, note:`NDJSON ${arr.length}줄`};
    throw new Error(`JSON 파싱 실패 (${e.message}).\n파일 앞부분: ${t.slice(0,80)}`);
  }
  if(Array.isArray(data)) return {recs:data, note:`배열 ${data.length}건`};
  if(data&&typeof data==="object"){
    for(const k of ["log","data","predictions","records","items","entries","result","logs"])
      if(Array.isArray(data[k])) return {recs:data[k], note:`{${k}:[...]} ${data[k].length}건`};
    const anyK=Object.keys(data).find(k=>Array.isArray(data[k])&&data[k].length&&typeof data[k][0]==="object");
    if(anyK) return {recs:data[anyK], note:`{${anyK}:[...]} ${data[anyK].length}건`};
    const vals=Object.values(data);
    if(vals.length&&vals.every(v=>v&&typeof v==="object"&&!Array.isArray(v)))
      return {recs:vals, note:`객체맵 ${vals.length}건`};
    throw new Error(`객체인데 레코드 배열을 못 찾음.\n최상위 키: ${Object.keys(data).slice(0,8).join(", ")||"(없음)"}`);
  }
  throw new Error("지원하지 않는 형식: "+typeof data);
}

function pruneLog(log){   // 평가완료 + 60일 초과 예측 자동 정리(로그 용량 관리). 대기 예측은 항상 유지
  const today=new Date();
  return log.filter(e=>{
    if(e.status==="pending"||e.pool==="legacy") return true;   // 대기·레거시(측정풀)는 정리 대상 아님
    const age=Math.floor((today-new Date(e.date+"T00:00:00Z"))/86400000);
    return age<=60;
  });
}

/* ═══ v10.1 계측(Phase 0·1) — 측정 전용, 채점에 일절 미반영 ═══ */

// 상승의 질 지표: 예측일 이하 봉(0..idx)만 사용 → 룩어헤드 차단
function qualityAt(hs,ls,cs,idx){
  const c=cs.slice(0,idx+1), h=hs.slice(0,idx+1);
  if(c.length<31) return null;
  const px=c[c.length-1];
  let max1d=null;
  for(let i=Math.max(1,c.length-20);i<c.length;i++){ const r=(c[i]/c[i-1]-1)*100; if(max1d==null||r>max1d) max1d=r; }
  const ret30=(px/c[c.length-31]-1)*100;
  const rets=[]; for(let i=Math.max(1,c.length-30);i<c.length;i++) rets.push((c[i]/c[i-1]-1)*100);
  const mean=rets.reduce((a,b)=>a+b,0)/rets.length;
  const vol=Math.sqrt(rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/rets.length);
  let spikeShare=null, spikeFlag=null;
  if(ret30>0&&max1d!=null) spikeShare=max1d/ret30; else spikeFlag="undefined_negative_ret";
  const s20=sma(c,20); let ab=0,abn=0;
  for(let i=Math.max(0,c.length-20);i<c.length;i++){ if(s20[i]==null) continue; abn++; if(c[i]>s20[i]) ab++; }
  let up=0,ud=0; for(let i=Math.max(1,c.length-20);i<c.length;i++){ ud++; if(c[i]>c[i-1]) up++; }
  const res30=mx(h.slice(-30)), res90=h.length>=90?mx(h.slice(-90)):res30;
  let resAbove=null; if(res30>px) resAbove=res30; else if(res90>px) resAbove=res90;
  const resDist= resAbove!=null? (resAbove/px-1) : null;   // null = 신고가권(위 저항 없음)
  const e5=last(ema(c,5)),e10=last(ema(c,10)),e20q=last(ema(c,20)),e60=last(ema(c,60));
  const trendAlive=!!(e5!=null&&e10!=null&&e20q!=null&&e60!=null&&e5>e10&&e10>e20q&&e20q>e60);
  const near= resDist!=null&&resDist<CONFIG.measure.nearResTh;
  return {max_1d_20:max1d, ret_30d:ret30, spike_share:spikeShare, spike_flag:spikeFlag,
    smoothness: vol>0? ret30/(vol*Math.sqrt(30)) : null,
    above20_pct: abn? ab/abn*100 : null, up_days_pct: ud? up/ud*100 : null,
    res_dist:resDist, trend_alive:trendAlive, res_x_trend:(near?"near_":"far_")+(trendAlive?"alive":"dead")};
}

// 소급 백필: 무스탑 21일 수익 · BTC알파 · 품질지표 · 스탑도달일수 · R:R · 스탑배수 시뮬
async function backfillLog(log){
  const M=CONFIG.measure, W=M.window, todayStr=todayUTC();
  // 대상: 21일 확정 미완료 건 + 오늘 아직 잠정갱신 안 된 건 (잠정치는 매일 갱신)
  const cand=log.filter(e=>{ if(!(e&&e.date&&(e.symbol||e.market))) return false;
    if(e.pool==="legacy") return e.backfilled!==true;          // 레거시는 과거 고정 데이터 → 1회만 백필
    return e.backfilled!==true||e.bf_todate_date!==todayStr; });
  // ★오염 가드: 업비트 KRW 마켓이 아닌 레코드(주식 로그 등)는 API 조회 자체를 하지 않음
  const validSet=await krwMarketSet();
  let done=0, prov=0, fixed=0, i=0, skip_invalid_market=0, skip_fetch_fail=0, skip_not_matured=0;
  const need=cand.filter(e=>{ const mk=mktOf(e);
    if(!MKT_RE.test(mk)||(validSet&&validSet.size&&!validSet.has(mk))){ skip_invalid_market++; return false; }
    return true; });
  const R=()=>({done,prov,fixed,skip_invalid_market,skip_fetch_fail,skip_not_matured,
    skipped:skip_invalid_market+skip_fetch_fail});
  if(!need.length) return R();
  let btc; try{ btc=await candDates("KRW-BTC"); }catch(err){ skip_fetch_fail+=need.length; return R(); }
  const bIdx={}; btc[0].forEach((d,i2)=>{ bIdx[d]=i2; });
  for(const e of need){
    i++;
    if(!e.market) e.market="KRW-"+e.symbol;                 // 키 복원(레코드에 market 없을 때)
    setStatus(`성과 백필 ${i}/${need.length} — ${e.symbol}${skip_invalid_market?` (오염 ${skip_invalid_market}건 건너뜀)`:""}`);
    if(i%25===0) saveLog(log);                              // ★체크포인트: 중단돼도 진행분 보존
    let ds,hs,ls,cs;
    try{ [ds,hs,ls,cs]=await candDates(e.market); }catch(err){ skip_fetch_fail++; continue; }   // 상폐/조회실패
    let i0=ds.indexOf(e.date);
    if(i0<0){ i0=-1; for(let k=0;k<ds.length;k++){ if(ds[k]<=e.date) i0=k; else break; } }
    if(i0<0){ skip_fetch_fail++; continue; }
    if(e.price==null) e.price=cs[i0];                       // 예측일 종가 복원
    const base=e.price;
    if(!e.quality_done){ const q=qualityAt(hs,ls,cs,i0); if(q){ Object.assign(e,q); e.quality_done=true; } }
    if(e.rr_at_score==null&&e.t1!=null&&e.stop!=null&&base>e.stop) e.rr_at_score=(e.t1-base)/(base-e.stop);
    const b0=bIdx[ds[i0]];
    if(e.btc_vol_30d==null&&b0!=null&&b0>=30){   // 예측시 BTC 30일 변동성(변동성 구간별 분리용)
      const bc=btc[3]; const rr=[]; for(let x=b0-29;x<=b0;x++) rr.push(bc[x]/bc[x-1]-1);
      const m=rr.reduce((a,b)=>a+b,0)/rr.length;
      e.btc_vol_30d=Math.sqrt(rr.reduce((a,b)=>a+(b-m)*(b-m),0)/rr.length)*100;
    }
    // ── 잠정(to-date): 예측일 초과 ~ 최신 봉. (레거시는 스킵 — 과거 시점이라 '오늘까지'가 무의미)
    const iLast=ds.length-1;
    if(e.pool!=="legacy"&&iLast>i0){
      const rTd=cs[iLast]/base-1;
      const bL=bIdx[ds[iLast]];
      const bTd=(b0!=null&&bL!=null)? btc[3][bL]/btc[3][b0]-1 : null;
      e.ret_todate_nostop=rTd; e.btc_ret_todate=bTd;
      e.alpha_todate= bTd!=null? rTd-bTd : null;
      e.win_vs_btc_todate= e.alpha_todate!=null? e.alpha_todate>0 : null;
      e.horizon_days=iLast-i0;
      if(e.days_to_stop==null&&e.stop!=null){
        for(let k=i0+1;k<=iLast;k++){ if(ls[k]<=e.stop){ e.days_to_stop=k-i0; break; } } }
      e.bf_todate_date=todayStr; prov++;
    }
    // 예측시 국면 근사(P5 국면별 분리용): BTC 종가 vs 50일선
    if(e.regime_at_pred==null&&b0!=null&&b0>=CONFIG.ind.emaSlow){
      const be=last(ema(btc[3].slice(0,b0+1),CONFIG.ind.emaSlow));
      if(be!=null) e.regime_at_pred= btc[3][b0]<be? "risk_off":"risk_on";
    }
    // ── 고정창(5d,10d 등): 예측일+Nd 만기 도달 시 확정. 21일보다 빨리 익어 지금 측정 가능. 결과는 예측일 초과 봉만
    const atrP0=atr(hs.slice(0,i0+1),ls.slice(0,i0+1),cs.slice(0,i0+1),CONFIG.ind.atr);
    if(atrP0&&e.atr_at_pred==null) e.atr_at_pred=atrP0;
    for(const N of (M.fixedWindows||[])){
      if(e["ret_"+N+"d"]!=null&&e["sim"+N]) continue;
      const endN=new Date(new Date(e.date+"T00:00:00Z").getTime()+N*86400000).toISOString().slice(0,10);
      if(endN>todayStr) continue;
      let iN=-1; for(let k=i0+1;k<ds.length;k++){ if(ds[k]<=endN) iN=k; else break; }
      if(iN<0) continue;
      const rN=cs[iN]/base-1, bN=bIdx[ds[iN]];
      const bRetN=(b0!=null&&bN!=null)? btc[3][bN]/btc[3][b0]-1 : null;
      if(e["ret_"+N+"d"]==null){
        e["ret_"+N+"d"]=rN; e["alpha_"+N+"d"]= bRetN!=null? rN-bRetN : null;
        e["win_vs_btc_"+N+"d"]= e["alpha_"+N+"d"]!=null? e["alpha_"+N+"d"]>0 : null;
        fixed++;
      }
      // P2: k×ATR 스탑배수 시뮬을 고정창에서도 산출(21일 만기 불필요) + BTC 벤치 병기
      if(atrP0&&!e["sim"+N]){
        const sm={}, sd={};
        for(const k of M.simK){ const sk=base-k*atrP0; let hit=null;
          for(let x=i0+1;x<=iN;x++){ if(ls[x]<=sk){ hit=x; break; } }
          sm["k"+k]= hit!=null? (sk/base-1) : rN;
          sd["k"+k]= hit!=null? (hit-i0) : null; }
        e["sim"+N]=sm; e["sim"+N+"Days"]=sd; e["simBtc"+N]=bRetN;
      }
    }
    // ── 확정(21일): 만기 도달 시에만. 결과는 예측일 '초과' 봉만 사용(룩어헤드 차단)
    const endStr=new Date(new Date(e.date+"T00:00:00Z").getTime()+W*86400000).toISOString().slice(0,10);
    if(e.backfilled!==true && endStr<=todayStr){
      let iEnd=-1; for(let k=i0+1;k<ds.length;k++){ if(ds[k]<=endStr) iEnd=k; else break; }
      if(iEnd>=0){
        const retNo=cs[iEnd]/base-1;
        const b1=bIdx[ds[iEnd]];
        const bRet=(b0!=null&&b1!=null)? btc[3][b1]/btc[3][b0]-1 : null;
        e.ret_21d_nostop=retNo; e.btc_ret_21d=bRet;
        e.alpha_21d= bRet!=null? retNo-bRet : null;
        e.win_vs_btc= e.alpha_21d!=null? e.alpha_21d>0 : null;
        const atrP=atr(hs.slice(0,i0+1),ls.slice(0,i0+1),cs.slice(0,i0+1),CONFIG.ind.atr);
        if(atrP){ e.atr_at_pred=atrP; e.sim={}; e.simDays={};
          for(const k of M.simK){ const sk=base-k*atrP; let hit=null;
            for(let x=i0+1;x<=iEnd;x++){ if(ls[x]<=sk){ hit=x; break; } }
            e.sim["k"+k]= hit!=null? (sk/base-1) : retNo;
            e.simDays["k"+k]= hit!=null? (hit-i0) : null; } }   // k별 스탑 도달일수(미도달=null)
        e.backfilled=true; done++;
      }
    } else if(e.backfilled!==true) skip_not_matured++;   // 21일 미도래(정상)
  }
  return R();
}

function perfSummary(log){   // 성과 통계 요약(화면·copytext 공용). 원본 로그가 아닌 '계산된 수치'만 반환
  const curV=CONFIG.version;
  const COMPAT=new Set(CONFIG.statsCompatible||[curV]);
  const inScope=(e)=>!e.synthetic && e.pool!=="legacy" && COMPAT.has(e.cfgVersion||"이전");   // 합성·레거시 격리(게이트/등급 미포함)
  const GRADES=[["🟢75+",75,101],["🟡60~74",60,75],["⚪45~59",45,60],["⛔<45",-1,45]];
  const done=(e)=>["stop","t1","t2","expire"].includes(e.status);
  const ev=log.filter(e=>done(e)&&inScope(e));
  const pend=log.filter(e=>e.status==="pending"&&inScope(e)).length;
  const grades=[]; let small=true;
  for(const[label,lo,hi]of GRADES){ const g=ev.filter(e=>e.score>=lo&&e.score<hi);
    if(!g.length){ grades.push({label,n:0}); continue; }
    const n=g.length; if(n>=10) small=false;
    const t1=g.filter(e=>["t1","t2"].includes(e.status)).length;
    const st=g.filter(e=>e.status==="stop").length;
    grades.push({label,n,t1pct:t1/n*100,stoppct:st/n*100,avgpct:g.reduce((x,e)=>x+(e.ret||0),0)/n*100}); }
  const track=(arr)=>{ if(!arr.length) return {n:0}; const n=arr.length;
    return {n, avg:arr.reduce((x,e)=>x+(e.ret||0),0)/n*100,
      up:arr.filter(e=>(e.ret||0)>=0.10).length/n*100, down:arr.filter(e=>(e.ret||0)<=-0.05).length/n*100}; };
  const exclArr=ev.filter(e=>e.score<45);
  const excl=track(exclArr), surge=track(exclArr.filter(e=>e.was_surge));   // 급등제외 = 제외∩급등 (하위 유형 합과 일치)
  const exclTrend=track(exclArr.filter(e=>e.surge_type==="trend"));          // 추세형(EMA정배열·완만) 제외
  const exclSpike=track(exclArr.filter(e=>e.surge_type==="spike"));          // 폭등형(스파이크) 제외
  const exclNormal=track(exclArr.filter(e=>(e.surge_type||"normal")==="normal")); // 일반(급등 아님) 제외
  let surgeVerdict;   // 급등 감점 가설 검증: 추세형과 폭등형을 같은 급등으로 취급한 게 옳았나
  if(exclTrend.n<10||exclSpike.n<10) surgeVerdict="추세형/폭등형 표본 부족, 관찰 지속";
  else if(exclTrend.avg>exclSpike.avg&&exclTrend.avg>5) surgeVerdict="⚠️ 급등 감점 재검토: 추세형(EMA정배열) 제외 종목이 실제로 올랐음(예: KAITO). 추세와 폭등 구분 필요.";
  else if(exclTrend.avg<0&&exclSpike.avg<0) surgeVerdict="✅ 급등 감점 유효: 추세형이든 폭등형이든 제외 후 하락. 거르기 정당.";
  else surgeVerdict="추세형/폭등형 혼재, 관찰 지속";
  let exclVerdict;
  if(excl.n<10) exclVerdict="표본 부족/혼재, 관찰 지속";
  else if(excl.avg<0 && excl.down>50) exclVerdict="✅ 거르기 유효: 제외 종목 실제 하락";
  else if(excl.avg>5 && excl.up>50) exclVerdict="⚠️ 거르기 재검토: 제외 종목 실제 상승(기회 놓침 가능)";
  else exclVerdict="표본 부족/혼재, 관찰 지속";
  const upper=ev.filter(e=>e.score>=60).length;
  const guard=(small||upper<10)?"🚧 튜닝 보류(표본 부족)":"검증 가능(표본 충분)";

  /* ═══ v10.1 계측 집계 — 절단 해소(무스탑) + 베타 보정(알파). status 무관, 백필된 건 전부 ═══ */
  const M=CONFIG.measure;
  const scoped=log.filter(inScope);
  // 측정 기준 자동 선택: 확정 표본이 minN 이상인 '가장 긴 창' 우선 (21d > 10d > 5d), 없으면 잠정(진행중)
  const BASES=[{key:"21d",af:"alpha_21d",rf:"ret_21d_nostop",wf:"win_vs_btc",label:`확정(${M.window}일)`,days:M.window}]
    .concat((M.fixedWindows||[]).slice().sort((a,b)=>b-a).map(N=>({key:N+"d",af:"alpha_"+N+"d",rf:"ret_"+N+"d",wf:"win_vs_btc_"+N+"d",label:`확정(${N}일 고정창)`,days:N})))
    .concat([{key:"todate",af:"alpha_todate",rf:"ret_todate_nostop",wf:"win_vs_btc_todate",label:"잠정(진행중)",days:null}]);
  let chosen=BASES[BASES.length-1];
  for(const b of BASES){ if(scoped.filter(e=>e[b.af]!=null).length>=CONFIG.gate.minN){ chosen=b; break; } }
  const AF=chosen.af, RF=chosen.rf, WF=chosen.wf;
  const useProv= chosen.key==="todate";
  const mAll=scoped.filter(e=>e[AF]!=null);
  const cAll=scoped.filter(e=>e.alpha_21d!=null);      // 확정(21일) 건수(표시용)
  const pAll=scoped.filter(e=>e.alpha_todate!=null);   // 잠정 건수(표시용)
  const avgDays= chosen.days!=null? chosen.days : (mAll.length? mAll.reduce((x,e)=>x+(e.horizon_days||0),0)/mAll.length : null);
  // 호라이즌 비교(창별 전체 알파·승률) — 5d/10d/21d/잠정 나란히
  const horizonCmp=BASES.map(b=>{ const a=scoped.filter(e=>e[b.af]!=null);
    return {label:b.label, key:b.key, n:a.length, chosen:b.key===chosen.key,
      alpha:a.length? a.reduce((x,e)=>x+e[b.af],0)/a.length*100 : null,
      win:a.length? a.filter(e=>e[b.wf]).length/a.length*100 : null}; });
  const astat=(arr)=>{ const a=arr.filter(e=>e[AF]!=null); if(!a.length) return {n:0};
    const n=a.length, rr=a.filter(e=>e.ret!=null);
    return {n, alpha:a.reduce((x,e)=>x+e[AF],0)/n*100,
      nostop:a.reduce((x,e)=>x+(e[RF]||0),0)/n*100,
      real: rr.length? rr.reduce((x,e)=>x+e.ret,0)/rr.length*100 : null,
      win:a.filter(e=>e[WF]).length/n*100}; };
  const mGrades=GRADES.map(([label,lo,hi])=>Object.assign({label},astat(mAll.filter(e=>e.score>=lo&&e.score<hi))));
  // B(병기): score_raw(국면감점 제외) 기준 알파 버킷 — 선별력 검증 전용. 등급 라벨·표시엔 미사용
  const rawAvail=mAll.filter(e=>e.score_raw!=null);
  const mGradesRaw=GRADES.map(([label,lo,hi])=>Object.assign({label},astat(rawAvail.filter(e=>e.score_raw>=lo&&e.score_raw<hi))));
  /* ═══ [C] score_prev 기준 = 전 기간 풀링(연속성). 옛 기록의 score 자체가 옛 공식이므로 그대로 사용 ═══ */
  const prevScoreOf=(e)=> e.score_prev!=null? e.score_prev : e.score;
  const prevPool=log.filter(e=>!e.synthetic&&!isLegacyRec(e)&&e[AF]!=null&&prevScoreOf(e)!=null);
  const mGradesPrev=GRADES.map(([label,lo,hi])=>Object.assign({label},
    astat(prevPool.filter(e=>{const v=prevScoreOf(e); return v>=lo&&v<hi;}))));
  /* ═══ [신규] score_pct — 만점 대비 %. 퍼센트 임계로 재버킷 시 알파 격차가 커지는지 비교(임계 변경 아님) ═══ */
  const SMAX=scoreMaxOf();
  const pctOf=(e)=> e.score_pct!=null? e.score_pct : (e.score!=null? e.score/SMAX*100 : null);
  const GP=[["🟢75%+",75,101],["🟡60~74%",60,75],["⚪45~59%",45,60],["⛔<45%",-1,45]];
  const mGradesPct=GP.map(([label,lo,hi])=>Object.assign({label},
    astat(mAll.filter(e=>{const v=pctOf(e); return v!=null&&v>=lo&&v<hi;}))));
  const gapOf=(arr)=>{ const t=arr[0],b=arr[3]; return (t.n&&b.n)? {aGap:Math.abs((t.alpha||0)-(b.alpha||0)), wGap:Math.abs((t.win||0)-(b.win||0)), nTop:t.n, nBot:b.n} : null; };
  const pctCompare={smax:SMAX, abs:gapOf(mGrades), pct:gapOf(mGradesPct),
    req:{"45":45/SMAX*100,"60":60/SMAX*100,"75":75/SMAX*100}};   // 절대 임계의 실질 요구치(%)
  if(pctCompare.abs&&pctCompare.pct) pctCompare.better= pctCompare.pct.aGap>pctCompare.abs.aGap;
  // [2] 200일선 미확보(신규상장 등) 버킷 — 폴백 +5를 받는 구조라 별도 추적. 배점 변경은 데이터 확인 후 결정
  const s200miss=astat(mAll.filter(e=>e.trend_s200_missing===true));
  const s200have=astat(mAll.filter(e=>e.trend_s200_missing===false));
  // [4] 전환기 분포 이동: score_prev(옛 공식) vs score(현행) 평균 차이
  const prevPairs=mAll.filter(e=>e.score_prev!=null&&e.score!=null);
  const shift= prevPairs.length? {n:prevPairs.length,
    prev:prevPairs.reduce((x,e)=>x+e.score_prev,0)/prevPairs.length,
    cur:prevPairs.reduce((x,e)=>x+e.score,0)/prevPairs.length} : {n:0};
  if(shift.n) shift.delta=shift.cur-shift.prev;
  const gTopR=mGradesRaw[0], gBotR=mGradesRaw[3];
  const gateRaw={n:rawAvail.length};
  if((gTopR.n||0)>=CONFIG.gate.minN&&(gBotR.n||0)>=CONFIG.gate.minN){
    gateRaw.aGap=Math.abs((gTopR.alpha||0)-(gBotR.alpha||0)); gateRaw.wGap=Math.abs((gTopR.win||0)-(gBotR.win||0));
    gateRaw.reason=`참고: score_raw 기준 알파격차 ${gateRaw.aGap.toFixed(1)}%p · 승률격차 ${gateRaw.wGap.toFixed(0)}%p`;
  } else gateRaw.reason=`참고: score_raw 기준도 표본 부족(🟢 n${gTopR.n||0} · ⛔ n${gBotR.n||0})`;
  const mEx=mAll.filter(e=>e.score<45);
  const mExcl=astat(mEx), mSurge=astat(mEx.filter(e=>e.was_surge));
  const mTrend=astat(mEx.filter(e=>e.surge_type==="trend"));
  const mSpike=astat(mEx.filter(e=>e.surge_type==="spike"));
  const mNormal=astat(mEx.filter(e=>(e.surge_type||"normal")==="normal"));
  /* ═══ P1: 판독을 '알파(무스탑 고정창)' 기준으로 전환. 절단 수익으로는 판정하지 않음 ═══ */
  const GN=CONFIG.gate.minN, note=(s)=>` <span style="color:#7b839a">${s}</span>`;
  // 제외추적 판독
  if(mExcl.n<GN) exclVerdict=`표본 부족 — 판정 보류`+note(`(알파기준 n${mExcl.n}/${GN} · 기준 ${chosen.label})`);
  else if(mExcl.alpha<0) exclVerdict=`✅ 거르기 유효: 제외 종목이 시장대비 마이너스 알파`+note(`(α ${mExcl.alpha.toFixed(1)}%p · 승률 ${mExcl.win.toFixed(0)}% · n${mExcl.n})`);
  else if(mExcl.alpha>0) exclVerdict=`⚠️ 거르기 재검토: 제외 종목이 시장대비 플러스 알파(기회 놓침 가능)`+note(`(α +${mExcl.alpha.toFixed(1)}%p · 승률 ${mExcl.win.toFixed(0)}% · n${mExcl.n})`);
  else exclVerdict="혼재 — 판정 보류";
  // 급등제외(추세형 vs 폭등형) 판독
  if(mTrend.n<GN||mSpike.n<GN)
    surgeVerdict=`표본 부족 — 판정 보류`+note(`(알파기준 추세형 n${mTrend.n} · 폭등형 n${mSpike.n} · 각 ${GN} 필요)`);
  else {
    if(mTrend.alpha>mSpike.alpha&&mTrend.alpha>0)
      surgeVerdict="⚠️ 급등 감점 재검토: 추세형(EMA정배열) 제외가 시장대비 플러스 알파(예: KAITO). 추세와 폭등 구분 필요.";
    else if(mTrend.alpha<0&&mSpike.alpha<0)
      surgeVerdict="✅ 급등 감점 유효: 추세형·폭등형 모두 알파 마이너스. 거르기 정당.";
    else surgeVerdict="추세형/폭등형 알파 혼재, 관찰 지속";
    surgeVerdict+=note(`(알파 기준 · 추세형 ${mTrend.alpha.toFixed(1)}%p(승 ${mTrend.win.toFixed(0)}%) vs 폭등형 ${mSpike.alpha.toFixed(1)}%p(승 ${mSpike.win.toFixed(0)}%))`);
  }
  /* ═══ P6: 스탑 회피 효과 — 스탑 맞은 건의 (실현수익 − 무스탑수익). 양수면 스탑이 손실을 막아준 것 ═══ */
  const stopped=scoped.filter(e=>e.ret!=null&&e[RF]!=null&&(e.status==="stop"||e.days_to_stop!=null));
  const stopGap= stopped.length? {n:stopped.length,
    real:stopped.reduce((x,e)=>x+e.ret,0)/stopped.length*100,
    nostop:stopped.reduce((x,e)=>x+e[RF],0)/stopped.length*100} : {n:0};
  if(stopGap.n) stopGap.gap=stopGap.real-stopGap.nostop;
  /* ═══ P5: 팩터 진단을 알파 기준으로 + 국면별(risk_on/risk_off) 분리 ═══ */
  const FACTORS=[["거래량",10],["셋업",8],["추세",30],["상대강도",6]];
  const fstat=(arr,k,thr)=>{ const hi=arr.filter(e=>(e.bd?.[k]||0)>=thr), lo=arr.filter(e=>(e.bd?.[k]||0)<thr);
    if(!hi.length||!lo.length) return null;
    const av=(a)=>a.reduce((x,e)=>x+e[AF],0)/a.length*100;
    return {k,thr,nHi:hi.length,nLo:lo.length,aHi:av(hi),aLo:av(lo),gap:av(hi)-av(lo)}; };
  const factorAlpha=FACTORS.map(([k,thr])=>fstat(mAll,k,thr)).filter(Boolean);
  const byRegime=["risk_on","risk_off"].map(rg=>({rg,
    n:mAll.filter(e=>e.regime_at_pred===rg).length,
    f:FACTORS.map(([k,thr])=>fstat(mAll.filter(e=>e.regime_at_pred===rg),k,thr)).filter(Boolean)}));
  // Phase2 게이트: 최상위(🟢) vs 최하위(⛔) 알파·승률 격차
  const gTop=mGrades[0], gBot=mGrades[3]; const G=CONFIG.gate; const gate={ok:false};
  if((gTop.n||0)>=G.minN&&(gBot.n||0)>=G.minN){
    gate.aGap=Math.abs((gTop.alpha||0)-(gBot.alpha||0)); gate.wGap=Math.abs((gTop.win||0)-(gBot.win||0));
    gate.ok= gate.aGap>=G.alphaGapTh||gate.wGap>=G.winGapTh;
    gate.reason= gate.ok? `✅ 튜닝 허용 — 알파격차 ${gate.aGap.toFixed(1)}%p · 승률격차 ${gate.wGap.toFixed(0)}%p`
      : `🚧 튜닝 보류 — 격차 미달(알파 ${gate.aGap.toFixed(1)}%p<${G.alphaGapTh} · 승률 ${gate.wGap.toFixed(0)}%p<${G.winGapTh})`;
  } else gate.reason=`🚧 튜닝 보류 — 표본 부족(🟢 n${gTop.n||0} · ⛔ n${gBot.n||0}, 각 ${G.minN} 필요)`;
  // spike_share 연속지표 재분류 vs 기존 EMA 이분법 대조
  const cont=(e)=> e.spike_share>=M.spikeShareTh? "spike":"trend";
  const cross={trend_trend:[],trend_spike:[],spike_trend:[],spike_spike:[]};
  for(const e of mAll.filter(x=>x.was_surge&&x.spike_share!=null)){
    const emaC=(e.surge_type==="trend")?"trend":"spike"; cross[emaC+"_"+cont(e)].push(e); }
  const reclass=Object.keys(cross).map(k=>Object.assign({key:k},astat(cross[k])));
  // 저항거리 × 추세생존 4분면 (라벨만, 방향 미단정)
  const resQuad=["near_alive","near_dead","far_alive","far_dead"].map(q=>Object.assign({q},astat(mAll.filter(e=>e.res_x_trend===q))));
  // 스탑 도달 일수 분포
  const dtsArr=mAll.filter(e=>e.days_to_stop!=null).map(e=>e.days_to_stop);
  const stopDays={n:dtsArr.length, d1_3:dtsArr.filter(d=>d<=3).length, d4_7:dtsArr.filter(d=>d>3&&d<=7).length, d8p:dtsArr.filter(d=>d>7).length};
  const hist=new Array(12).fill(0); for(const d of dtsArr){ hist[d<=10?d:11]++; }   // idx 1..10, 11='10+'
  stopDays.hist=hist;
  stopDays.pct1_3= stopDays.n? stopDays.d1_3/stopDays.n*100 : null;
  // P6: 3일 집중만으로 단정 금지 — stop_avoided_gap 부호와 함께 판정
  if(stopDays.n<10) stopDays.verdict="표본 부족, 관찰 지속";
  else if(stopGap.n<10) stopDays.verdict=(stopDays.pct1_3>=50?"3일 이내 집중":"고르게 분포")+" · 스탑회피효과 표본 부족 → 판정 보류";
  else if(stopGap.gap>0) stopDays.verdict=`✅ 스탑 유효 — 스탑회피효과 +${stopGap.gap.toFixed(1)}%p (3일이내 ${stopDays.pct1_3.toFixed(0)}%지만 스탑이 손실을 막음)`;
  else stopDays.verdict=`⚠️ 노이즈 스탑 — 스탑회피효과 ${stopGap.gap.toFixed(1)}%p (스탑이 이익을 잘라먹음)`;
  // Phase4 스탑 배수 시뮬(리포트 전용)
  const simArr=mAll.filter(e=>e.sim&&e.btc_ret_21d!=null);
  const sim=M.simK.map(k=>{ const key="k"+k; const a=simArr.filter(e=>e.sim[key]!=null);
    if(!a.length) return {k,n:0};
    return {k,n:a.length, ret:a.reduce((x,e)=>x+e.sim[key],0)/a.length*100,
      alpha:a.reduce((x,e)=>x+(e.sim[key]-e.btc_ret_21d),0)/a.length*100,
      win:a.filter(e=>(e.sim[key]-e.btc_ret_21d)>0).length/a.length*100}; });
  // Phase4-2 점수 상한 캡 조사
  const AXES=[["추세",30],["모멘텀",20],["거래량",10],["셋업",15],["상대강도",10]];
  const caps=AXES.map(([k,maxv])=>{
    const a=mAll.filter(e=>e.bd&&e.bd[k]!=null); if(!a.length) return {k,n:0,maxv};
    const vals=a.map(e=>e.bd[k]); const dist={};
    for(const v of vals) dist[v]=(dist[v]||0)+1;      // P4-1: 원점수 분포
    return {k,n:a.length,maxv,atCap:a.filter(e=>e.bd[k]>=maxv).length/a.length*100,
      dist:Object.keys(dist).map(Number).sort((x,y)=>x-y).map(v=>({v,c:dist[v],pct:dist[v]/vals.length*100})),
      levels:Object.keys(dist).length}; });
  // P4-2: 거래량·셋업 제외 75점 재채점 시 상/하위 알파 격차가 커지는지 (리포트 전용 — 채점 미반영)
  const capSim=(()=>{
    const a=mAll.filter(e=>e.bd&&e.bd["추세"]!=null&&e[AF]!=null); if(a.length<8) return {n:a.length};
    const spread=(scoreFn)=>{ const s=a.map(e=>({v:scoreFn(e),al:e[AF]*100})).sort((x,y)=>y.v-x.v);
      const q=Math.max(1,Math.floor(s.length/4));
      const top=s.slice(0,q), bot=s.slice(-q);
      const av=(arr)=>arr.reduce((x,o)=>x+o.al,0)/arr.length;
      return {top:av(top),bot:av(bot),gap:av(top)-av(bot),q}; };
    const cur=spread(e=>e.score);
    const alt=spread(e=>["추세","모멘텀","상대강도"].reduce((x,k)=>x+(e.bd[k]||0),0)+(e.bd["감점"]||0));
    return {n:a.length, cur, alt, better:alt.gap>cur.gap}; })();
  const backfilled=log.filter(e=>e.backfilled).length;

  return {curV, compat:[...COMPAT], n:ev.length, pend, grades, excl, surge, exclTrend, exclSpike, exclNormal,
    exclVerdict, surgeVerdict, guard, hasData:ev.length>0,
    mN:mAll.length, backfilled, mGrades, mExcl, mSurge, mTrend, mSpike, mNormal,
    gate, reclass, resQuad, stopDays, sim, caps, capSim, stopGap, factorAlpha, byRegime, hasMeasure:mAll.length>0,
    mGradesRaw, gateRaw, s200miss, s200have, shift, mGradesPrev, nPrevPool:prevPool.length, mGradesPct, pctCompare,
    provisional:useProv, nConfirmed:cAll.length, nProv:pAll.length, avgDays, horizonCmp,
    basis: useProv? `잠정(진행중 · 평균 ${avgDays!=null?avgDays.toFixed(1):"-"}일 보유)` : chosen.label};
}

// 측정 전용 풀(레거시+v10, 채점규칙 무관·가격기반만). 허용: 스탑시뮬/질지표/변동성분포. 금지: 등급성과/게이트
function poolReport(log){
  const M=CONFIG.measure, COMPAT=new Set(CONFIG.statsCompatible||[]);
  const mean=a=>a.length? a.reduce((x,y)=>x+y,0)/a.length : null;
  // P3: 레거시(v7~v9 자동) + v10 호환 = 측정 전용 풀
  const cand=log.filter(e=> !e.synthetic && (isLegacyRec(e)||COMPAT.has(e.cfgVersion||"이전")));
  // P2: 창 선택 — 21일 확정이 부족하면 10일·5일 고정창 시뮬로 대체(만기 도래분이 많아 n>0)
  const WINS=[{key:"21d",sim:"sim",days:"simDays",btc:e=>e.btc_ret_21d,label:`21일`}]
    .concat((M.fixedWindows||[]).slice().sort((a,b)=>b-a).map(N=>({key:N+"d",sim:"sim"+N,days:"sim"+N+"Days",btc:(e)=>e["simBtc"+N],label:`${N}일 고정창`})));
  let W=null, pool=[];
  for(const w of WINS){ const p=cand.filter(e=>e[w.sim]&&w.btc(e)!=null);
    if(p.length>=CONFIG.gate.minN){ W=w; pool=p; break; }
    if(p.length>pool.length){ W=w; pool=p; } }
  if(!pool.length) return null;
  const nLeg=pool.filter(isLegacyRec).length;
  // 스탑배수 시뮬 (k×ATR14): 무스탑수익·알파·승률·스탑아웃률·평균 도달일수
  const stopSim=M.simK.map(k=>{ const key="k"+k; const a=pool.filter(e=>e[W.sim][key]!=null); if(!a.length) return {k,n:0};
    const dd=a.filter(e=>e[W.days]&&e[W.days][key]!=null).map(e=>e[W.days][key]);
    return {k, n:a.length, ret:mean(a.map(e=>e[W.sim][key]))*100, alpha:mean(a.map(e=>e[W.sim][key]-W.btc(e)))*100,
      win:a.filter(e=>(e[W.sim][key]-W.btc(e))>0).length/a.length*100,
      stopHit:dd.length/a.length*100, avgDays:mean(dd)}; });
  const best=stopSim.filter(s=>s.n).slice().sort((a,b)=>b.alpha-a.alpha)[0];
  // 변동성 구간별 스탑 도달일수 (표준 스탑 k=2 기준) — 풀링하지 않고 분리
  const vb=[["저변동 <3%",0,3],["중변동 3~6%",3,6],["고변동 ≥6%",6,1e9]];
  const kStd="k"+(M.simK.includes(2)?2:M.simK[Math.floor(M.simK.length/2)]);
  const byVol=vb.map(([lab,lo,hi])=>{ const a=pool.filter(e=>e.btc_vol_30d!=null&&e.btc_vol_30d>=lo&&e.btc_vol_30d<hi&&e[W.days]&&e[W.days][kStd]!=null);
    const d=a.map(e=>e[W.days][kStd]);
    return {lab,n:a.length, pct1_3:d.length?d.filter(x=>x<=3).length/d.length*100:null, avg:mean(d)}; });
  // 질지표 분포(spike_share 사분위)
  const ss=pool.filter(e=>e.spike_share!=null).map(e=>e.spike_share).sort((a,b)=>a-b);
  const q=(p)=> ss.length? ss[Math.min(ss.length-1,Math.floor(p*ss.length))] : null;
  const quality={n:ss.length, p25:q(.25), p50:q(.5), p75:q(.75), spikeHeavy: ss.length? ss.filter(x=>x>=M.spikeShareTh).length/ss.length*100 : null};
  return {n:pool.length, nLeg, nV10:pool.length-nLeg, kStd, stopSim, best, byVol, quality, winLabel:W.label};
}

function measureReport(ps){
  if(!ps.hasMeasure) return `<div class="meta">🔬 <b>v10.1 계측</b>: 백필 대기 — 예측 후 ${CONFIG.measure.window}일 지난 건이 생기면 무스탑수익·알파가 채워집니다. (백필 완료 ${ps.backfilled}건)</div>`;
  const p=(v,d)=> v==null?"-":((v>=0?"+":"")+v.toFixed(d==null?1:d)+"%");
  const w=(v)=> v==null?"-":v.toFixed(0)+"%";
  const row=(lab,s)=> s.n? `<tr><td>${lab}</td><td>${s.n}</td><td>${p(s.real)}</td><td>${p(s.nostop)}</td><td>${p(s.alpha)}</td><td>${w(s.win)}</td></tr>`
                         : `<tr><td>${lab}</td><td>0</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
  let h=`<details open><summary style="color:#ffd257;font-weight:800">🔬 v10.1 계측 리포트 (측정기준: ${ps.basis} · n=${ps.mN})</summary>`;
  h+=`<div class="meta">측정기준 <b>${ps.basis}</b> · <b>채택표본 ${ps.mN}건</b> <span style="color:#7b839a">(참고: 21일확정 ${ps.nConfirmed} / 잠정 ${ps.nProv})</span>${ps.provisional?`<br>⚠️ 21일 만기 도달 건이 ${CONFIG.gate.minN}건 미만이라 <b>잠정(진행중) 기준</b>으로 집계 중. 만기 건이 쌓이면 자동으로 확정 기준으로 전환됩니다.`:""}</div>`;
  h+=`<div class="meta">스탑 절단 해소(무스탑 보유) + BTC 베타 보정(알파). <b>알파·승률·n 3종 병기</b>가 원칙 — 하나만 보면 오독.<br>이중채점: 종목선별="알파(vs BTC)" · 국면게이트="무스탑수익(vs 현금 0%)"</div>`;
  if(ps.horizonCmp){
    h+=`<div class="line" style="margin-top:10px"><b>호라이즌 비교</b> <span style="color:#7b839a">(창별 전체 알파·승률 · ▶=현재 채택 기준)</span></div>`;
    h+=`<table><tr><th>보유창</th><th>n</th><th>알파</th><th>승률</th></tr>`;
    for(const hc of ps.horizonCmp) h+=`<tr${hc.chosen?' style="background:#1a2440"':''}><td>${hc.chosen?"▶ ":""}${hc.label}</td><td>${hc.n}</td><td>${hc.n?p(hc.alpha):"-"}</td><td>${hc.n?w(hc.win):"-"}</td></tr>`;
    h+=`</table>`;
  }
  h+=`<table><tr><th>버킷</th><th>n</th><th>실현(스탑)</th><th>무스탑</th><th>알파</th><th>시장대비승률</th></tr>`;
  for(const g of ps.mGrades) h+=row(g.label,g);
  h+=row("급등제외(7d+15%↑)",ps.mSurge)+row("&nbsp;&nbsp;↳추세형",ps.mTrend)+row("&nbsp;&nbsp;↳폭등형",ps.mSpike)+row("&nbsp;&nbsp;일반제외",ps.mNormal);
  h+=`</table>`;
  h+=`<div class="meta"><b>Phase2 게이트:</b> ${ps.gate.reason}</div>`;
  // B(병기): score_raw(국면감점 제외) 기준 선별력 — ★검증 전용. 등급 라벨·진입판단은 위 score_final 기준 유지
  if(ps.mGradesRaw&&ps.mGradesRaw.some(g=>g.n)){
    h+=`<div class="line" style="margin-top:12px"><b>병기: score_raw 기준 알파 버킷</b> <span style="color:#7b839a">(국면감점 제외 · <b>선별력 검증 전용</b> — 등급 라벨/표시/진입판단은 score_final 유지)</span></div>`;
    h+=`<table><tr><th>등급(raw)</th><th>n</th><th>알파</th><th>승률</th></tr>`;
    for(const g of ps.mGradesRaw) h+=`<tr><td>${g.label}</td><td>${g.n||0}</td><td>${g.n?p(g.alpha):"-"}</td><td>${g.n?w(g.win):"-"}</td></tr>`;
    h+=`</table><div class="meta">${ps.gateRaw.reason} <span style="color:#7b839a">· 이 표는 튜닝 게이트에 영향 없음(게이트는 score_final 기준)</span></div>`;
  }
  // [2] 200일선 미확보 버킷 추적 (신규상장 폴백 +5 구조 감시)
  const sm=ps.s200miss, sh=ps.s200have;
  if((sm&&sm.n)||(sh&&sh.n)){
    h+=`<div class="line" style="margin-top:12px"><b>[2] 200일선 미확보(신규상장 등) 버킷</b> <span style="color:#7b839a">(폴백 +5 수령 구조 — 배점 변경은 데이터 확인 후 결정)</span></div>`;
    h+=`<table><tr><th>구분</th><th>n</th><th>알파</th><th>승률</th></tr>`
      +`<tr${sm&&sm.n&&sh&&sh.n&&sm.alpha<sh.alpha?' style="background:#3a1720"':''}><td>200일선 미확보(+5 폴백)</td><td>${sm.n||0}</td><td>${sm.n?p(sm.alpha):"-"}</td><td>${sm.n?w(sm.win):"-"}</td></tr>`
      +`<tr><td>200일선 확보</td><td>${sh.n||0}</td><td>${sh.n?p(sh.alpha):"-"}</td><td>${sh.n?w(sh.win):"-"}</td></tr></table>`;
    if(sm&&sm.n&&sh&&sh.n) h+=`<div class="meta">${sm.alpha<sh.alpha?"⚠️ 미확보 버킷이 더 나쁨 — 폴백 +5가 역방향 가점일 가능성":"미확보 버킷이 나쁘지 않음 — 폴백 유지 근거"} <span style="color:#7b839a">(판단 보류, 관찰 지속)</span></div>`;
  }
  // [C] score_prev 기준 전 기간 풀링 — 버전 분리에도 연속 추적
  if(ps.mGradesPrev&&ps.mGradesPrev.some(g=>g.n)){
    h+=`<div class="line" style="margin-top:12px"><b>[C] score_prev 기준(옛 공식) — 전 기간 풀링</b> <span style="color:#7b839a">(버전 분리와 무관하게 연속 추적 · n${ps.nPrevPool})</span></div>`;
    h+=`<table><tr><th>등급(prev)</th><th>n</th><th>알파</th><th>승률</th></tr>`;
    for(const g of ps.mGradesPrev) h+=`<tr><td>${g.label}</td><td>${g.n||0}</td><td>${g.n?p(g.alpha):"-"}</td><td>${g.n?w(g.win):"-"}</td></tr>`;
    h+=`</table>`;
  }
  // [신규] 만점 대비 % 재버킷 비교 — 임계 변경 아님, 어느 기준이 더 잘 가르는지 측정만
  const pcC=ps.pctCompare;
  if(pcC){
    h+=`<div class="line" style="margin-top:12px"><b>[신규] 절대점수 vs 만점대비% 재버킷</b> <span style="color:#7b839a">(만점 ${pcC.smax}점 · <b>임계 변경 아님</b>, 측정 전용)</span></div>`;
    h+=`<div class="meta">현행 절대 임계의 <b>실질 요구치</b>: 45점=${pcC.req["45"].toFixed(1)}% · 60점=${pcC.req["60"].toFixed(1)}% · 75점=${pcC.req["75"].toFixed(1)}% <span style="color:#7b839a">(의도한 45/60/75%와 괴리)</span></div>`;
    h+=`<table><tr><th>등급(%기준)</th><th>n</th><th>알파</th><th>승률</th></tr>`;
    for(const g of ps.mGradesPct) h+=`<tr><td>${g.label}</td><td>${g.n||0}</td><td>${g.n?p(g.alpha):"-"}</td><td>${g.n?w(g.win):"-"}</td></tr>`;
    h+=`</table>`;
    h+=`<div class="meta">${(pcC.abs&&pcC.pct)
      ? `상·하위 알파격차 — 절대 ${pcC.abs.aGap.toFixed(1)}%p(n${pcC.abs.nTop}/${pcC.abs.nBot}) vs %기준 ${pcC.pct.aGap.toFixed(1)}%p(n${pcC.pct.nTop}/${pcC.pct.nBot}) → <b>${pcC.better?"%기준이 더 잘 가름":"절대 기준이 더 잘 가름"}</b>`
      : "양쪽 상·하위 버킷 표본 부족 — 비교 보류"} <span style="color:#7b839a">· 판단 보류, 임계는 그대로</span></div>`;
  }
  // [4] 전환기 분포 이동
  const sf=ps.shift;
  if(sf&&sf.n) h+=`<div class="meta"><b>[4] 점수 분포 이동</b>(200일선 수정 전→후): 옛 공식 평균 ${sf.prev.toFixed(1)} → 현행 평균 ${sf.cur.toFixed(1)} = <b>${sf.delta>=0?"+":""}${sf.delta.toFixed(1)}점</b> (n${sf.n}) <span style="color:#7b839a">· 하락은 정상(리스크오프에선 대부분 200일선 아래)</span></div>`;
  const kn={trend_trend:"추세형→추세형(일치)",trend_spike:"추세형→폭등형(오분류 의심)",spike_trend:"폭등형→추세형(오분류 의심)",spike_spike:"폭등형→폭등형(일치)"};
  h+=`<div class="line" style="margin-top:12px"><b>spike_share 재분류 × EMA 이분법 대조</b> <span style="color:#7b839a">(임계 ${CONFIG.measure.spikeShareTh})</span></div>`;
  h+=`<table><tr><th>EMA판정 → 연속지표</th><th>n</th><th>알파</th><th>승률</th></tr>`;
  for(const r of ps.reclass) h+=`<tr><td>${kn[r.key]}</td><td>${r.n||0}</td><td>${r.n?p(r.alpha):"-"}</td><td>${r.n?w(r.win):"-"}</td></tr>`;
  h+=`</table>`;
  h+=`<div class="line" style="margin-top:12px"><b>저항거리 × 추세생존 4분면</b> <span style="color:#7b839a">(라벨만 — 좋고나쁨 미단정)</span></div>`;
  h+=`<table><tr><th>분면</th><th>n</th><th>알파</th><th>승률</th></tr>`;
  for(const r of ps.resQuad) h+=`<tr><td>${r.q}</td><td>${r.n||0}</td><td>${r.n?p(r.alpha):"-"}</td><td>${r.n?w(r.win):"-"}</td></tr>`;
  h+=`</table>`;
  const sd=ps.stopDays;
  h+=`<div class="line" style="margin-top:12px"><b>스탑 도달 일수 히스토그램</b> <span style="color:#7b839a">(21일 만기 무관 — 스탑 맞은 건 전부)</span></div>`;
  if(sd.n&&sd.hist){ const mxh=Math.max(1,...sd.hist);
    h+=`<div style="font-family:ui-monospace,monospace;font-size:12px;line-height:1.5;background:#0c1322;border:1px solid #202942;border-radius:9px;padding:8px 10px">`;
    for(let d=1;d<=11;d++){ const c=sd.hist[d]; const bar="█".repeat(Math.round(c/mxh*16));
      h+=`${(d===11?"10+":String(d)).padStart(3," ").replace(/ /g,"&nbsp;")}일 ${bar||"&nbsp;"} ${c}<br>`; }
    h+=`</div>`;
  }
  h+=`<div class="meta">n${sd.n} · 1~3일 ${sd.d1_3} · 4~7일 ${sd.d4_7} · 8일+ ${sd.d8p} → ${sd.verdict}</div>`;
  // P6: 스탑 회피 효과
  const sg=ps.stopGap;
  const pp=(v)=> v==null?"-":((v>=0?"+":"")+v.toFixed(1)+"%p");
  h+=`<div class="meta"><b>🛡️ 스탑 회피 효과</b> = 스탑 맞은 건의 (실현 − 무스탑) · ${sg.n?`n${sg.n} · 실현 ${p(sg.real)} − 무스탑 ${p(sg.nostop)} = <b>${pp(sg.gap)}</b> → ${sg.gap>0?"✅ 스탑이 손실을 막아줌":"⚠️ 스탑이 이익을 잘라먹음(노이즈)"}`:"표본 부족"}<br>
    <span style="color:#7b839a">※ 3일 이내 집중만으로 노이즈 스탑이라 단정 금지 — 이 지표 부호와 함께 판정</span></div>`;
  h+=`<div class="line" style="margin-top:12px"><b>Phase4 스탑 배수 시뮬</b> <span style="color:#7b839a">(리포트 전용 — 채점 미반영)</span></div>`;
  h+=`<table><tr><th>k(×ATR14)</th><th>n</th><th>평균수익</th><th>알파</th><th>승률</th></tr>`;
  for(const s of ps.sim) h+=`<tr><td>${s.k.toFixed(1)}</td><td>${s.n||0}</td><td>${s.n?p(s.ret):"-"}</td><td>${s.n?p(s.alpha):"-"}</td><td>${s.n?w(s.win):"-"}</td></tr>`;
  h+=`</table>`;
  // P4: 캡 포화 조사 (리포트 전용 — 채점 미반영)
  h+=`<div class="line" style="margin-top:12px"><b>P4 점수 상한 캡 조사</b> <span style="color:#7b839a">(만점 비율 높으면 변별력 소실 · 리포트 전용, 채점 미반영)</span></div>`;
  h+=`<table><tr><th>축</th><th>만점</th><th>n</th><th>캡 도달률</th><th>구간수</th><th>원점수 분포</th></tr>`;
  for(const c of ps.caps){ const sat=c.n&&c.atCap>=50;
    const dist=(c.dist||[]).map(d=>`${d.v}:${d.pct.toFixed(0)}%`).join(" ");
    h+=`<tr${sat?' style="background:#3a1720"':''}><td>${c.k}</td><td>${c.maxv}</td><td>${c.n||0}</td><td>${c.n?c.atCap.toFixed(0)+"%":"-"}${sat?" ⚠️포화":""}</td><td>${c.levels||"-"}</td><td style="font-size:11px">${dist||"-"}</td></tr>`; }
  h+=`</table>`;
  const cs2=ps.capSim;
  if(cs2&&cs2.cur){
    const g=(v)=>((v>=0?"+":"")+v.toFixed(1)+"%p");
    h+=`<div class="meta"><b>75점 재채점 시뮬</b>(거래량·셋업 제외) — 상·하위 25%(각 n${cs2.cur.q}) 알파 격차<br>
      현재 100점: 상위 ${g(cs2.cur.top)} vs 하위 ${g(cs2.cur.bot)} → <b>격차 ${g(cs2.cur.gap)}</b><br>
      75점(2축 제외): 상위 ${g(cs2.alt.top)} vs 하위 ${g(cs2.alt.bot)} → <b>격차 ${g(cs2.alt.gap)}</b><br>
      → ${cs2.better?"⚠️ 2축 제외 시 변별력이 <b>커짐</b> — 캡 포화가 변별력을 깎고 있을 가능성":"2축 제외 시 변별력이 줄어듦 — 두 축이 기여 중"}
      <span style="color:#7b839a">(리포트일 뿐, 채점은 그대로)</span></div>`;
  } else h+=`<div class="meta">75점 재채점 시뮬: 표본 부족(n${cs2?cs2.n||0:0})</div>`;
  h+=`</details>`;
  return h;
}

function perfStats(log){
  const curV=CONFIG.version;
  const GRADES=[["🟢75+",75,101],["🟡60~74",60,75],["⚪45~59",45,60],["⛔<45",-1,45]];
  const done=(e)=>["stop","t1","t2","expire"].includes(e.status);
  const evAll=log.filter(done);
  const COMPAT=new Set(CONFIG.statsCompatible||[curV]);
  const inScope=(e)=>!e.synthetic && e.pool!=="legacy" && COMPAT.has(e.cfgVersion||"이전");   // 합성·레거시 격리 + 채점 호환 버전
  const ev=evAll.filter(inScope);                               // 채점 호환 규칙버전 묶음
  const otherV=evAll.length-ev.length;
  const pends=log.filter(e=>e.status==="pending"&&inScope(e));
  const pend=pends.length;
  const gl=(sc)=>{ for(const[lab,lo,hi]of GRADES) if(sc>=lo&&sc<hi) return lab; return"?"; };
  const pdist={}; for(const e of pends) pdist[gl(e.score)]=(pdist[gl(e.score)]||0)+1;
  const pdistStr=GRADES.map(([lab])=>`${lab} ${pdist[lab]||0}`).join(" · ");
  // P7: 다른 규칙버전을 평가/대기로 분리 표기해 합계가 총 건수와 맞도록
  const otherPend=log.filter(e=>e.status==="pending"&&!inScope(e)&&!e.synthetic).length;
  const vnote= (otherV||otherPend)? ` · 다른 규칙버전 ${otherV+otherPend}건(평가 ${otherV} / 대기 ${otherPend}) 제외됨` : "";
  let h=`<div class="sechd">📊 자기검증 <span style="color:#7b839a;font-size:12px;font-weight:400">(규칙 ${curV})</span></div>`;
  if(!ev.length){ h+=`<div class="meta">현재 규칙(${curV})으로 평가 완료된 예측 없음 (대기 ${pend}건 · 예측 1일 후부터 자동 평가)${vnote}<br>대기 등급 분포: ${pdistStr}</div>`;
    h+=measureReport(perfSummary(log)); h+=poolReportHTML(log); return h; }
  h+=`<div class="meta">평가 ${ev.length}건 · 대기 ${pend}건${vnote}</div>`;
  const psm=perfSummary(log);   // 알파·승률 병기용(Phase2-2)
  const mg={}; psm.mGrades.forEach(g=>{ mg[g.label]=g; });
  h+=`<table><tr><th>등급</th><th>n</th><th>T1</th><th>T2</th><th>스탑</th><th>만료</th><th>평균</th><th>무스탑</th><th>알파</th><th>승률</th></tr>`;
  let small=true;
  for(const[label,lo,hi]of GRADES){ const g=ev.filter(e=>e.score>=lo&&e.score<hi); if(!g.length) continue;
    const n=g.length; if(n>=10) small=false;
    const t1=g.filter(e=>["t1","t2"].includes(e.status)).length, t2=g.filter(e=>e.status==="t2").length;
    const st=g.filter(e=>e.status==="stop").length, ex=g.filter(e=>e.status==="expire").length;
    const ar=g.reduce((x,e)=>x+(e.ret||0),0)/n*100;
    const flag=n<10?" ⚠️":"";
    const M2=mg[label]||{n:0};
    const f1=(v)=> v==null?"-":((v>=0?"+":"")+v.toFixed(1)+"%");
    h+=`<tr><td>${label}</td><td>${n}${flag}</td><td>${(t1/n*100).toFixed(0)}%</td><td>${(t2/n*100).toFixed(0)}%</td><td>${(st/n*100).toFixed(0)}%</td><td>${(ex/n*100).toFixed(0)}%</td><td>${ar>=0?"+":""}${ar.toFixed(1)}%</td>`
      +`<td>${M2.n?f1(M2.nostop):"-"}</td><td>${M2.n?f1(M2.alpha):"-"}</td><td>${M2.n?M2.win.toFixed(0)+"%":"-"}</td></tr>`; }
  h+=`</table><div class="meta">대기 등급 분포: ${pdistStr}</div>`;
  // 팩터 진단
  const diag=[];
  for(const[k,thr]of [["거래량",10],["셋업",8],["추세",30],["상대강도",6]]){
    const hi=ev.filter(e=>(e.bd?.[k]||0)>=thr), lo=ev.filter(e=>(e.bd?.[k]||0)<thr);
    if(hi.length&&lo.length){ const ah=hi.reduce((x,e)=>x+(e.ret||0),0)/hi.length*100, al=lo.reduce((x,e)=>x+(e.ret||0),0)/lo.length*100;
      diag.push(`${k}≥${thr}: ${ah>=0?"+":""}${ah.toFixed(1)}% vs 미만 ${al>=0?"+":""}${al.toFixed(1)}%`); } }
  h+=`<div class="meta"><b>팩터 진단(평균수익·절단·참고용):</b> ${diag.length?diag.join(" · "):"표본 부족"}</div>`;
  // P5: 팩터 진단 알파 기준 + 국면별 분리 (기록·관찰만, 배점 변경 없음)
  if(psm.factorAlpha&&psm.factorAlpha.length){
    const fa=(v)=>((v>=0?"+":"")+v.toFixed(1)+"%p");
    h+=`<div class="line" style="margin-top:10px"><b>★ 팩터 진단 — 알파 기준</b> <span style="color:#7b839a">(음수 격차 = 역방향)</span></div>`;
    h+=`<table><tr><th>축</th><th>n(≥/&lt;)</th><th>충족 알파</th><th>미달 알파</th><th>격차</th></tr>`;
    for(const f of psm.factorAlpha) h+=`<tr${f.gap<0?' style="background:#3a1720"':''}><td>${f.k}≥${f.thr}</td><td>${f.nHi}/${f.nLo}</td><td>${fa(f.aHi)}</td><td>${fa(f.aLo)}</td><td><b>${fa(f.gap)}</b>${f.gap<0?" ⚠️역방향":""}</td></tr>`;
    h+=`</table>`;
    for(const rg of (psm.byRegime||[])){ if(!rg.f.length) continue;
      h+=`<div class="meta">${rg.rg==="risk_off"?"🔴 리스크오프":"🟢 리스크온"} (n${rg.n}): ${rg.f.map(f=>`${f.k} ${fa(f.gap)}`).join(" · ")}</div>`; }
  }
  const upper=ev.filter(e=>e.score>=60);
  if(small||upper.length<10)
    h+=`<div class="meta warn">🚧 튜닝 보류 권고: 표본 부족(🟢🟡 상위등급 평가 ${upper.length}건). 각 등급 n≥10 + 21일 창이 여러 번 완주해야 통계 유효. 지금 CONFIG 가중치 바꾸면 과적합 위험 — 데이터 쌓일 때까지 관찰만.</div>`;
  else h+=`<div class="meta">🟢 등급이 아래 등급보다 T1 적중률·평균수익이 높아야 점수 체계 유효. 이 표를 클로드에 붙여 CONFIG 튜닝 제안 요청 가능.</div>`;
  // 제외 종목 추적 (v10.0) — 거르기 로직이 옳은지 검증
  const ps=psm;
  h+=`<div class="sechd" style="font-size:14px">🗑️ 제외 종목 추적 <span style="color:#7b839a;font-size:11px;font-weight:400">(거르기 로직 검증)</span></div>`;
  h+=`<table><tr><th></th><th>n</th><th>평균수익</th><th>상승 +10%↑</th><th>하락 -5%↓</th></tr>`;
  const trk=(lab,t)=> t.n?`<tr><td>${lab}</td><td>${t.n}</td><td>${t.avg>=0?"+":""}${t.avg.toFixed(1)}%</td><td>${t.up.toFixed(0)}%</td><td>${t.down.toFixed(0)}%</td></tr>`:`<tr><td>${lab}</td><td>0</td><td>-</td><td>-</td><td>-</td></tr>`;
  h+=trk("제외(&lt;45)",ps.excl)+trk("급등제외(7d+15%↑)",ps.surge)
    +trk("&nbsp;&nbsp;↳ 추세형(EMA정배열·완만)",ps.exclTrend)
    +trk("&nbsp;&nbsp;↳ 폭등형(하루 +15%↑ 스파이크)",ps.exclSpike)
    +trk("&nbsp;&nbsp;일반 제외(급등 아님)",ps.exclNormal)+`</table>`;
  // P1: 판정의 근거는 알파 — n/알파/승률 3열 병기 (위 절단수익 표는 참고용으로 유지)
  const a1=(v)=> v==null?"-":((v>=0?"+":"")+v.toFixed(1)+"%p");
  const w1=(v)=> v==null?"-":v.toFixed(0)+"%";
  const arow=(lab,s)=> `<tr><td>${lab}</td><td>${s.n||0}</td><td>${s.n?a1(s.alpha):"-"}</td><td>${s.n?w1(s.win):"-"}</td></tr>`;
  h+=`<div class="line" style="margin-top:10px"><b>★ 판정 근거 — 알파 기준</b> <span style="color:#7b839a">(무스탑 ${psm.basis} · 절단 없음)</span></div>`;
  h+=`<table><tr><th>구분</th><th>n</th><th>알파</th><th>시장대비승률</th></tr>`
    +arow("제외(&lt;45)",ps.mExcl)+arow("급등제외",ps.mSurge)
    +arow("&nbsp;&nbsp;↳ 추세형",ps.mTrend)+arow("&nbsp;&nbsp;↳ 폭등형",ps.mSpike)+arow("&nbsp;&nbsp;일반제외",ps.mNormal)+`</table>`;
  h+=`<div class="meta">${ps.exclVerdict}<br>${ps.surgeVerdict}</div>`;
  h+=measureReport(ps);
  h+=poolReportHTML(log);
  return h; }

function poolReportHTML(log){
  const pr=poolReport(log); if(!pr) return "";
  const p=(v)=> v==null?"-":((v>=0?"+":"")+v.toFixed(1)+"%");
  const w=(v)=> v==null?"-":v.toFixed(0)+"%";
  const d=(v)=> v==null?"-":v.toFixed(1)+"일";
  let h=`<details open><summary style="color:#7fb0ff;font-weight:800">🧪 측정 전용 풀 — 스탑배수 시뮬 [${pr.winLabel}] (레거시 ${pr.nLeg} + v10 ${pr.nV10} = ${pr.n}건)</summary>`;
  h+=`<div class="meta">⚠️ 레거시는 <b>스크리너가 뽑은 후보군 표본이지 전체 시장 표본이 아님</b>(선택편향 존재). 가격에서 재계산(v7 스탑판정 무시)했고 <b>등급성과·게이트엔 미포함</b>. 스탑배수·질지표 등 가격기반 분석 전용.</div>`;
  h+=`<div class="line"><b>스탑배수 시뮬 (k×ATR14)</b> — 알파 최댓값 k가 최적 후보</div>`;
  h+=`<table><tr><th>k</th><th>n</th><th>평균수익</th><th>알파</th><th>승률</th><th>스탑피격</th><th>평균도달일</th></tr>`;
  for(const s of pr.stopSim) h+=`<tr${pr.best&&s.k===pr.best.k?' style="background:#123d2a"':''}><td>${pr.best&&s.k===pr.best.k?"★ ":""}${s.k.toFixed(1)}</td><td>${s.n||0}</td><td>${s.n?p(s.ret):"-"}</td><td>${s.n?p(s.alpha):"-"}</td><td>${s.n?w(s.win):"-"}</td><td>${s.n?w(s.stopHit):"-"}</td><td>${s.n?d(s.avgDays):"-"}</td></tr>`;
  h+=`</table>`;
  if(pr.best) h+=`<div class="meta">현 스탑(-5%≈1×ATR) 대비 <b>최적 k=${pr.best.k.toFixed(1)}×ATR</b> (알파 ${p(pr.best.alpha)} · 스탑피격 ${w(pr.best.stopHit)}). ONDO형 '방향 맞고 노이즈 손절'은 이 표의 k=1.0 스탑피격률로 확인.</div>`;
  h+=`<div class="line" style="margin-top:12px"><b>스탑 도달일수 — BTC 변동성 구간별</b> <span style="color:#7b839a">(${pr.kStd} 기준 · 풀링 안 함)</span></div>`;
  h+=`<table><tr><th>변동성 구간</th><th>n</th><th>3일이내 피격</th><th>평균도달일</th></tr>`;
  for(const b of pr.byVol) h+=`<tr><td>${b.lab}</td><td>${b.n}</td><td>${b.n?w(b.pct1_3):"-"}</td><td>${b.n?d(b.avg):"-"}</td></tr>`;
  h+=`</table>`;
  h+=`<div class="meta"><b>질지표 분포(spike_share):</b> ${pr.quality.n?`n${pr.quality.n} · 사분위 ${pr.quality.p25!=null?pr.quality.p25.toFixed(2):"-"}/${pr.quality.p50!=null?pr.quality.p50.toFixed(2):"-"}/${pr.quality.p75!=null?pr.quality.p75.toFixed(2):"-"} · 폭등형(≥${CONFIG.measure.spikeShareTh}) ${w(pr.quality.spikeHeavy)}`:"표본 부족"}</div>`;
  h+=`</details>`;
  return h;
}

/* ---------- 메인 빌드 ---------- */
async function build(shortlist){
  const SEL=CONFIG.select;
  setStatus("종목 목록 불러오는 중…"); setProg(0.03);
  const uni=await universe();
  setStatus("현재가·거래대금 불러오는 중…"); setProg(0.08);
  const tk=await tickers(uni.map(u=>u.market));
  const now=new Date();
  const elapsed=(now.getUTCHours()*3600+now.getUTCMinutes()*60+now.getUTCSeconds())/86400;
  setStatus("BTC 국면 분석 중…"); setProg(0.12);
  const btc=await daily("KRW-BTC"); const btcCc=btc[2].slice(0,-1);   // 봉수는 CONFIG.ind.candleCount(페이징)
  const btc7= btcCc.length>=7? (btc[2][btc[2].length-1]/btcCc[btcCc.length-7]-1)*100 : null;
  const btcClose=btc[2][btc[2].length-1];
  const btcE50=last(ema(btcCc,CONFIG.ind.emaSlow));
  const riskoff=!!(btcE50&&btcClose<btcE50);              // 국면① BTC<50일선
  const btcMa50Gap= btcE50? (btcClose/btcE50-1)*100 : null;   // 50일선 이격(복사요약용)
  let btcVol30=null;
  if(btcCc.length>=31){ const rr=[]; for(let x=btcCc.length-30;x<btcCc.length;x++) rr.push(btcCc[x]/btcCc[x-1]-1);
    const m2=rr.reduce((a,b)=>a+b,0)/rr.length;
    btcVol30=Math.sqrt(rr.reduce((a,b)=>a+(b-m2)*(b-m2),0)/rr.length)*100; }
  // 국면② 거래량 위축: BTC 일봉 거래대금(오늘 페이스보정) vs 최근 7일 완성캔들 평균
  const RG=CONFIG.regime; const btcTP=btc[4]||[];
  const tpDone=btcTP.slice(0,-1);
  const tpToday= btcTP.length? btcTP[btcTP.length-1]/Math.max(elapsed,0.08) : null;
  const tpAvg7= tpDone.length>=7? tpDone.slice(-7).reduce((x,y)=>x+y,0)/7 : null;
  const volContract=!!(tpToday!=null&&tpAvg7&&tpToday<tpAvg7*RG.volContractRatio);
  const mom=[],quiet=[];
  for(const u of uni){ const t=tk[u.market]; if(!t||(t.tv||0)<SEL.minTradeValue24h) continue;
    const liq=3*Math.max(Math.log10(t.tv+1)-8,0); const pen=u.warn?8:0; const ch=t.ch24;
    if(Math.abs(ch)<SEL.minAbsChange) continue;
    mom.push([SEL.momentumWeight*ch+liq-pen,u,t]); if(Math.abs(ch)<=SEL.quietMaxChange) quiet.push([liq-pen,u,t]); }
  mom.sort((a,b)=>b[0]-a[0]); quiet.sort((a,b)=>b[0]-a[0]);
  const nMom=Math.max(Math.floor(shortlist*SEL.momShareNum/SEL.momShareDen),1); const picked=new Map();
  for(const[,u,t]of mom.slice(0,nMom)) picked.set(u.market,[u,t]);
  for(const[,u,t]of quiet){ if(picked.size>=shortlist) break; if(!picked.has(u.market)) picked.set(u.market,[u,t]); }
  for(const[,u,t]of mom.slice(nMom)){ if(picked.size>=shortlist) break; if(!picked.has(u.market)) picked.set(u.market,[u,t]); }

  // 1차: 후보 분석 (추가 API 없음 — 국면③용 c7 수집)
  const anz=[],skipped=[]; const list=[...picked.values()]; let cnt=0;
  for(const[u,t]of list){ cnt++;
    setStatus(`분석 중 ${cnt}/${list.length} — ${u.symbol}`); setProg(0.15+0.65*cnt/list.length);
    let h,l,c,v; try{ [h,l,c,v]=await daily(u.market); }catch(e){ skipped.push(u.symbol); continue; }   // 페이징 봉수 사용
    const a=analyze(h,l,c,v,elapsed); if(!a){ skipped.push(u.symbol); continue; }
    const [tr,tn]=tier(t.tv,u.warn); anz.push({a,u,t,tr,tn}); }
  // 국면③ BTC 주도장: btc7 > 후보(BTC 제외) c7 중앙값
  const c7s=anz.filter(x=>x.u.symbol!=="BTC").map(x=>x.a.c7).filter(v=>v!=null).sort((x,y)=>x-y);
  const medC7= c7s.length? (c7s.length%2? c7s[(c7s.length-1)/2] : (c7s[c7s.length/2-1]+c7s[c7s.length/2])/2) : null;
  const btcDom=!!(btc7!=null&&medC7!=null&&btc7>medC7);
  // 국면 종합 감점 + 켜진 플래그
  let regimePen=0; const flags=[];
  if(riskoff){ regimePen+=RG.btcBelowMa; flags.push("BTC 50일선 아래"); }
  if(volContract){ regimePen+=RG.volContract; flags.push("거래량 위축"); }
  if(btcDom){ regimePen+=RG.btcDominance; flags.push("BTC 주도장"); }
  // 2차: 국면 감점 반영해 스코어링
  const rows=[];
  for(const{a,u,t,tr,tn}of anz){
    const warnPen= u.warn?CONFIG.warning.warnPts:(u.caution?CONFIG.warning.cautionPts:0);  // 유의/주의 개별 감점
    let [sc,bd]=score(a,btc7,regimePen+warnPen); const pl=plan(a);
    // B(병기): 국면감점을 뺀 선별력 검증용 점수. ★표시·등급라벨·진입판단엔 절대 사용하지 않음
    let [scRaw]=score(a,btc7,warnPen);
    // [4] score_prev: 수정 전 공식(s200을 항상 null로 본 옛 동작) 재현 — 전환기 분포 이동 측정용
    let [scPrev]=score(Object.assign({},a,{s200:null}),btc7,regimePen+warnPen);
    if(u.warn){ sc=0; scRaw=0; scPrev=0; }   // ★Phase3 하드룰: 유의종목은 점수 무관 ⛔제외
    rows.push([sc,bd,a,pl,u,tr,tn,scRaw,scPrev]); }
  rows.sort((a,b)=>b[0]-a[0]);
  return {rows,skipped,btc7,riskoff,regimePen,flags,now,btcMa50Gap,btcVol30}; }

/* ---------- 렌더링 ---------- */
function gcls(sc){ return sc>=75?"g75":(sc>=60?"g60":(sc>=45?"g45":"g0")); }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function regimeLabel(pen){
  if(pen===0) return "🟢 리스크온 (BTC>50일선·거래량 유지·알트 순환)";
  if(pen>=-5) return "🟡 중립 (일부 약세 신호)";
  return "🔴 리스크오프 (약세 신호 겹침) — 스윙 비수기, 관망 권장"; }

  const psum=perfSummary(log);   // 성과 통계(계산된 요약만, 원본 로그 미포함)

  }
  const pr=poolReport(log); let poolLine="";
  if(pr&&pr.best){ const ss=pr.stopSim.filter(s=>s.n).map(s=>`k${s.k.toFixed(1)} α${(s.alpha>=0?"+":"")+s.alpha.toFixed(1)}%·피격${s.stopHit.toFixed(0)}%`).join(" / ");
    poolLine=`[측정풀·${pr.winLabel}] 레거시${pr.nLeg}+v10 ${pr.nV10} · 스탑배수시뮬(k×ATR): ${ss} · 최적 k${pr.best.k.toFixed(1)}\n`; }
  // [플랜] 45점 이상 후보만 (없으면 "45+ 없음") — 진입 논의에 필요한 가격·플랜 일괄 제공
  const planRows=rows.filter(x=>x[0]>=45);
  const nz=(v,d)=> v==null?"-":(+v).toFixed(d==null?2:d);
  const planBlock=`[플랜]\n`+(planRows.length? planRows.map(([sc,bd,a,pl,u])=>
      ` ${u.symbol} 현재가 ${won(a.p)} / 스탑 ${won(pl.stop)} / T1 ${won(pl.t1)} / T2 ${won(pl.t2)}`
      +` / R:R ${pl.rr1!=null?pl.rr1:"-"} / ATR14 ${won(a.atr)} / spike ${a.spikeShare!=null?nz(a.spikeShare):"-"}`
      +` / res_x_trend ${a.resXTrend||"-"} / ${u.warn?"🚨유의종목":"🚨없음"}`).join("\n")
    : ` 45+ 없음`)+`\n`;
  const gapTxt= btcMa50Gap==null?"-":((btcMa50Gap>=0?"+":"")+btcMa50Gap.toFixed(1)+"%");
  const volTxt= btcVol30==null?"-":btcVol30.toFixed(1);
  const copytext=`[기준] ${nows} · 규칙 ${CONFIG.version} · 후보 ${rows.length}개\n`
    +`[심볼] ${syms}\n[종목명] ${names}\n`
    +`[국면] ${regShort} · BTC7일 ${btcTxt} · BTC 50일선이격 ${gapTxt} · BTC변동성(30d) ${volTxt} · 켜진신호: ${flagTxt}\n`
    +`[상세] ${detail}\n${planBlock}${perfBlock}${poolLine}`
    +`→ 업비트 스윙 후보야. [상세]숫자=총점,🚨=유의종목(진입금지). [플랜]은 45+ 후보의 가격·트레이드플랜. [성과]는 알파(무스탑·BTC대비) 기준 자기검증 통계 — 실현수익은 스탑에 절단된 값이라 참고용. 동향 조사 + (성과 있으면)거르기 로직 유효성 판단 도와줘.`;
  h+=`<div class="copybox"><b>📋 클로드에 넘길 요약</b>
    <textarea id="cpb" readonly>${esc(copytext)}</textarea>
    <button id="copyBtn">복사</button>
    <div class="disc" style="margin:8px 2px 0">복사 → 클로드에 붙여넣기. 성과 표가 쌓이면 그것도 함께 붙여 CONFIG 튜닝 요청.</div></div>`;

  /* 로그 백업 */
  h+=`<div class="copybox"><b>💾 로그 백업</b>
    <div class="disc" style="margin:6px 2px 0">예측 기록은 이 폰에만 저장됩니다. 내보내서 백업하거나, 새 폰/PC에서 불러오세요. (파일을 클로드에 첨부하면 심층 분석도 가능)</div>
    <div class="row" style="margin-top:10px">
      <button id="expBtn" class="btn2">내보내기(JSON)</button>
      <button id="impBtn" class="btn2">불러오기</button>
      <input id="impFile" type="file" accept="application/json,.json" style="display:none">
    </div>
    <div class="row" style="margin-top:8px">
      <button id="scanBtn" class="btn2">🧹 오염 점검</button>
      <button id="delBtn" class="btn2">🗑️ 오염 제거</button>
      <button id="undoBtn" class="btn2">↩️ 되돌리기</button>
    </div>
    <div id="scanOut" class="disc" style="margin-top:8px;line-height:1.6"></div></div>`;

  h+=`<details><summary>📖 용어 설명 (처음이면 펼쳐보세요)</summary>
    <div class="line">• <b>점수(0~100)</b>: 높을수록 지금 사기 좋은 자리. 75+ 강함 / 60~74 조건부 / 45~59 관망 / 45미만 피함.<br>
    • <b>RSI</b>: 상승·하락 힘의 균형(0~100). 50 근처 무난, 70↑ 과열, 30↓ 침체.<br>
    • <b>MACD 골든/데드</b>: 단기 추세가 위로(골든)/아래로(데드) 도는 신호.<br>
    • <b>거래량 N배</b>: 20일 평균 대비 오늘 몰린 돈. 1.2배↑면 관심 붙는 중.<br>
    • <b>주봉 위/아래</b>: 주 단위 큰 흐름. 아래쪽이면 반등이어도 역추세라 위험.<br>
    • <b>진입존/스탑/목표</b>: 살 가격대 / 손절 / 익절(+10%·+20%).<br>
    • <b>RR(손익비)</b>: 잃을 위험 대비 노리는 수익. 높을수록 유리.<br>
    • <b>저항/매물대</b>: 위에서 팔 사람 많아 잘 못 뚫는 가격대.<br>
    • <b>감점</b>: 급등·거래량없음·손절빡빡·장기하락 등 위험요소 차감.<br>
    • <b>T1/T2/T3</b>: 코인 규모(유동성) 등급. T3=작은 코인(급변 위험 큼).</div></details>`;

  h+=`<div class="disc">⚠️ 매수 권유가 아니라 참고용 스크리닝입니다. 진입 전 업비트 공지·뉴스를 직접 확인하고(DYOR), 한 번에 잃을 돈은 총자본의 1~2%로 제한하세요. +10~20%는 목표선이지 도달 보장이 아닙니다. 점수 기준은 아직 검증 중인 임시 설정입니다.</div>`;

  out.innerHTML=h;

  const cbtn=$("#copyBtn"), ta=$("#cpb");
  cbtn.onclick=async()=>{ try{ await navigator.clipboard.writeText(copytext); }
    catch(e){ ta.focus(); ta.select(); try{document.execCommand("copy");}catch(_){} }
    cbtn.textContent="복사됨 ✓"; cbtn.style.background="#35C28B"; };

  $("#expBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(log,null,1)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`swing_log_${todayUTC()}.json`;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); };
  const SNAP=LOG_KEY+"_snapshot";
  const snapshot=(arr)=>{ try{ localStorage.setItem(SNAP,JSON.stringify({at:new Date().toISOString(),log:arr})); return true; }catch(_){ return false; } };
  const symList=(a)=> a.length? ` (${a.slice(0,15).join(", ")}${a.length>15?` 외 ${a.length-15}종`:""})` : "";
  $("#scanBtn").onclick=async()=>{
    $("#scanOut").innerHTML="점검 중…";
    const cur=loadLog(); const vs=await krwMarketSet(); const s=scanContamination(cur,vs);
    $("#scanOut").innerHTML=`<b>점검 결과 (dry-run · 삭제 안 함)</b> — 총 ${s.total}건<br>`
      +`🔴 <b>확정 오염 ${s.confirmed.length}건</b>${symList(s.confirmedSyms)}<br>`
      +`🟡 의심 ${s.suspect.length}건${symList(s.suspectSyms)} <span style="color:#7b839a">← 목록 확인 후 판단: 주식 티커면 삭제, 상폐 코인이면 보존 (제거 시 물어봄)</span><br>`
      +`사유: ${Object.entries(s.reasons).map(([k,v])=>k+" "+v).join(" · ")||"-"}<br>`
      +`제거 시 잔여: <b>확정만 ${s.afterRemoveConfirmed}건</b> / 확정+의심 ${s.afterRemoveBoth}건`;
  };
  $("#delBtn").onclick=async()=>{
    const cur=loadLog(); const vs=await krwMarketSet(); const s=scanContamination(cur,vs);
    if(!s.confirmed.length&&!s.suspect.length){ alert("오염 레코드가 없습니다."); return; }
    const bad=new Set();
    if(s.confirmed.length){
      if(confirm(`🔴 확정 오염 ${s.confirmed.length}건을 삭제합니다.\n예: ${s.confirmedSyms.slice(0,6).join(", ")}\n${cur.length} → ${s.afterRemoveConfirmed}건\n\n삭제 전 자동 스냅샷 저장. 진행할까요?`))
        s.confirmed.forEach(x=>bad.add(x.e));
      else return;
    }
    if(s.suspect.length){   // 의심은 개별 판단 — 주식 티커면 삭제, 상폐 코인이면 보존
      if(confirm(`🟡 의심 ${s.suspect.length}건도 함께 삭제할까요?\n${s.suspectSyms.slice(0,10).join(", ")}${s.suspectSyms.length>10?" 외":""}\n\n[확인] = 위 목록이 코인이 아님(주식 등) → 삭제\n[취소] = 상폐된 코인 → 보존`))
        s.suspect.forEach(x=>bad.add(x.e));
    }
    if(!bad.size){ alert("삭제할 항목이 없습니다."); return; }
    snapshot(cur);
    const kept=cur.filter(e=>!bad.has(e));
    saveLog(kept);
    alert(`삭제 완료: ${cur.length} → ${kept.length}건 (제거 ${cur.length-kept.length})\n↩️ 되돌리기로 복원 가능. [실행]을 눌러 반영하세요.`);
    $("#scanBtn").click();
  };
  $("#undoBtn").onclick=()=>{
    let snap=null; try{ snap=JSON.parse(localStorage.getItem(SNAP)||"null"); }catch(_){}
    if(!snap||!Array.isArray(snap.log)){ alert("복원할 스냅샷이 없습니다."); return; }
    if(!confirm(`스냅샷(${snap.at.slice(0,19).replace("T"," ")})으로 되돌립니다.\n현재 ${loadLog().length}건 → ${snap.log.length}건\n\n진행할까요?`)) return;
    saveLog(snap.log); alert(`복원 완료: ${snap.log.length}건. [실행]을 눌러 반영하세요.`);
  };
  $("#impBtn").onclick=()=>$("#impFile").click();
  $("#impFile").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=async()=>{ try{ const parsed=toRecords(rd.result); const inc=parsed.recs;
      const withKey=inc.filter(x=>x&&x.date&&x.symbol);
      if(!withKey.length) throw new Error(`레코드 ${inc.length}건 중 date+symbol 있는 건이 0건.\n첫 레코드 키: ${inc[0]&&typeof inc[0]==="object"?Object.keys(inc[0]).slice(0,8).join(", "):"(객체 아님)"}`);
      // ★임포트 가드: 업비트 KRW 마켓만 허용 (주식 로그 등 오염 차단)
      const vs=await krwMarketSet();
      const valid=withKey.filter(x=>{ const mk=mktOf(x); return MKT_RE.test(mk)&&(!vs||!vs.size||vs.has(mk)); });
      const rej=withKey.length-valid.length;
      if(!valid.length) throw new Error(`업비트 스윙 로그가 아닙니다. 임포트를 취소했습니다.\n(검사 ${withKey.length}건 전부 업비트 마켓 아님 · 예: ${withKey.slice(0,3).map(x=>mktOf(x)||"(마켓없음)").join(", ")})`);
      if(rej>0&&!confirm(`총 ${withKey.length}건 중 ${valid.length}건만 업비트 마켓입니다.\n${rej}건은 거부됩니다(업비트 마켓 아님).\n\n계속할까요?`)) return;
      const cur=loadLog();
      try{ localStorage.setItem(LOG_KEY+"_snapshot",JSON.stringify({at:new Date().toISOString(),log:cur})); }catch(_){}
      const have=new Set(cur.map(x=>x.date+"|"+x.symbol));
      let added=0, leg=0;
      for(const x of valid){ const key=x.date+"|"+x.symbol; if(have.has(key)) continue; have.add(key);
        if(!x.cfgVersion){   // 레거시(버전태그 없음) → 측정 전용 풀. 심볼·예측일만 사용, status/score/스탑판정 전부 폐기
          cur.push({date:x.date,symbol:x.symbol,market:x.market||("KRW-"+x.symbol),pool:"legacy",status:"legacy"}); leg++;
        } else { cur.push(x); added++; }
      }
      const dup=valid.length-added-leg;
      saveLog(cur); alert(`불러오기 완료 [형식: ${parsed.note}]\n검사 ${withKey.length} → 임포트 ${added+leg} (일반 ${added} · 레거시 ${leg}) · 중복 ${dup} · 거부 ${rej}\n총 ${cur.length}건. ↩️ 되돌리기로 복원 가능.\n[실행]을 누르면 반영됩니다.`);
    }catch(err){ alert("불러오기 실패: "+err.message); } };
    rd.readAsText(f); };
}

/* ---------- 실행 ---------- */
async function run(){
  runBtn.disabled=true; out.innerHTML=""; setProg(0);
  const shortlist=parseInt($("#n").value,10);
  try{
    let log=loadLog();
    setStatus("이전 예측 자동 평가 중…");
    const nEval=await evaluateLog(log);
    const bf=await backfillLog(log);          // v10.1 소급 백필(무스탑수익·알파·품질지표)
    saveLog(log);                             // 백필 진행분 즉시 보존(중단 대비)
    const res=await build(shortlist);
    appendPredictions(log,res.rows,todayUTC());
    log=pruneLog(log);              // 평가완료 60일 초과 정리(로그 용량 관리)
    saveLog(log);
    setProg(1); setStatus(`완료 · 후보 ${res.rows.length}개 · 평가 ${nEval}건 · 백필 확정 ${bf.done}/고정창 ${bf.fixed}/잠정 ${bf.prov}`
      +` · skip 오염 ${bf.skip_invalid_market}/미도래 ${bf.skip_not_matured}/조회실패 ${bf.skip_fetch_fail} · ${CONFIG.version}`);
    render(res,log,nEval);
  }catch(e){
    setStatus("오류: "+e.message);
    out.innerHTML=`<div class="card warn">실행 중 오류가 났습니다: ${esc(e.message)}<br>잠시 후(업비트 요청 제한 가능) 다시 [실행]을 눌러보세요.</div>`;
  }finally{ runBtn.disabled=false; }
}
runBtn.addEventListener("click",run);
</script>
